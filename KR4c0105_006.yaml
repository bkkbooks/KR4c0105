body:
  text: 黃御史集卷六唐黃滔撰墓志銘司直陳公墓志銘姬孔之教與日月以懸天顔閔之馨作芝蘭而出地可不誄清塵於桂苑揭貞石於松阡叙白楊之别生悲風示黃壤之下藏嘉氣者哉漢太丘長二十三世孫南安縣尉諱真生處士蕘蕘生大理評事齊忠信篤敬不類今世嘗有白雀巢其庭宇佳蓮産其池塘識者謂其後必大有子九人皆力儒學公其長也諱嶠字延封齠齓好學弱冠能文與髙陽許龜圖江夏黃彥修居莆之北巖精舍五年而二子西去復居北平山兩地穴管寧之榻十霜索隋氏之珠然後應詔諸侯求試宗伯而以咸通乾符之際龍門有萬仞之險鶯谷無孤飛之羽才名則溫岐韓銖羅隱皆退黜不巳故公自丁丑之及丙申高價馳而逸步躓既而大盜移國德公文行之深者安州鄭郎中諴孫拾遺泰嘆而勉之久乃持輦下之屈名適蜀中之貢府致鄉士倒屣場席開路清風既爾竊為權官沽諸將求識而薦之公時巳出經試比言之者缺一字策紙而亡是舉光啓二年收開三年榮登故相滎陽鄭公禮部上第大哉公為人謹信居家純孝事繼親彌善廬先君墓泣血有聞其所為文扣孟軻揚雄戶牖凡三百篇有表奏牘頗為前輩推工且大唐之設網士得之於是者歲幾人焉矧復有避宦者之節若走衝虛之車焉滎陽公自以得人其春首門人脫麻攝京兆府參軍司空太原公帥閩解榻以缺一字辟之為大從事受大理評事兼監察御史今府相繼擁于節旄益賢其參畫奏大理司直兼殿中方期輟從藩屏入踐諫垣不幸寢疾浹辰不起矣享齡七十有五光化二年十月三日嗚呼將來失其龜鏡斫者喪其般倕雖登大年終恨朝露三年庚申正月十七日丙午葬于泉州莆田縣崇教里北平故山禮也公兩娶魯國林夫人滎陽潘夫人其子三人仲曰說買石太湖刋文愚與公同邑閩越江山莆陽為靈秀之最貞元中林端公藻冠東南之科第十年而許員外稷繼翔其後詞人亹亹若陳厚慶陳泛陳黯林皓許溫林速許龜圖黃彥修許超林郁俱以夢筆之詞籝金之學半生隨計沒齒䘖寃曠乎百年而公追二賢之後七年而徐正字寅捷八年而愚缺一字莫不江山之數耶猗歟昔之負高才不以位而碑者襄陽惟孟先生焉今也纍懿德不隆位而碑者以陳夫子始愚沾巾宿草無愧抽毫其辭曰江山之秀鍾乎人純孝高節并其身掬兹二美摛為雄文以之登桂科以之列蓮賓斯為君子誰曰未仁嗚呼九原宜樹貞珉祭文祭陳侍御嶠維光化三年歲次庚申正月庚寅朔十五日甲辰將仕郎守國子四門博士黃某謹以清酌之奠敬祭于侍御陳君延封之靈伏以靈閩之江山莆稱秀絶首武德之科級自貞元之英哲其後繼生碩儒亹亹鴻都交懷荆璞互握隋珠皆指期於拾芥終慟哭於彎弧洎宣皇之後年則夫子之斯出持曾參之孝行袖孟軻之文帙薦賦諸侯上書聖日射宫而徑挺弦矢藝圃而葳蕤華實難亨者吾道難偶者至公管仲三奔非戰之過孫𢎞十上蓋時未通七千里而辛勤上國二十年而惆悵東風人皆一一以興憤我獨孜孜而養䝉既而鳳闕飛塵龜城挂榜儀曹方急於中興權宦輒窺其上賞殊不知楊吟誦於犬子景薦延乎商鞅古為不然吾肯斯倣誰不竒夫子之節誰不高夫子之名冰霜却汚松柏居貞渭水之釣有守武城之徑寧行逮夫岷峨歲改岐雍煙清天子復含元謁見有司新都省權衡巍巍令聞赫赫嘉聲遂從寰海迥翥蓬瀛振輝光於甲乙開道路於孤平望高而先脫麻衣家逺而須榮鄉土十二人林君茂躅一百年莆邑大數君侯設醴以前席里巷拜塵而如堵雷車轞轞鶴駕翩翩初命就門見東周之三語前程不日俟西漢之七遷旋以孔樽引滿徐榻解懸白璧黃金而疊矣玳簪珠履以加焉列藩所得者賢才古人所重者知已既將推珍於席上豈獨矜詞於雪裏莊周說劍則韓魏呈鐔郭隗升臺則樂鄒覯止繡衣曜日驄馬嘶煙飛詔而賓階次第假途而棘寺盤旋莫不漢帷駐䇿薛石留箋從容渥澤寵異淹延胡言薤露忽敗椿年嗚呼石火風燭驚波逝川聖賢之不免矣古今之共痛焉某江鄉則中外親姻帝里則參差硯席干名而後乎一紀論友而仰乎三益蟬槐結念幾同京洛之愁鶯栁看時各署神仙之籍别來輦下歸自甌中塵忝而郤詵桂緑因依而王儉蓮紅斷金益固投漆攸同見行藏於柱史論倚伏於塞翁實期以始者文場之懿德邇來使府之清風伏蒲北省起草南宫更雪當時之寃滯少為吾黨之隆崇是何天之喪道之窮匆匆大夜默默𤣥穹某復曉夕以思江山之事林君則以合浦垂名夫子以申秦得意高步斯振宏規靡異前輩曠世後來遂志俱蟠使下之柏俱擅乙中之二林端公貞元七年首閩越之科第以珠還合浦賦擅名後十年莆邑許員外榮登自此文學之士繼踵而悉不偶時曠八十七年始鍾於延封其文以申秦續篇擅名後六七年徐正字及第兼某塵忝林端公同延封榜皆第十二人皆開路於後人皆終使府大判官判官皆柏臺林荆南延封閩中也推是言之豈偶然耳賢哲相望今昔一致嗚呼延封昨日而冰壺仙霧今辰而丹旐芻靈雖死生之理能一終痛傷之懇罔寧况以平生樹德幽宅刋銘無慙郭泰之賢箋毫曷措爰枉趙岐之寄涕淚交零水咽雲愁風悲日暮精靈一閉於泉壤歲月空蒼於壠樹椒壺略備蘭俎聊具申永訣於斯言庶冥感其誠素嗚呼哀哉祭先外舅伏以彼蒼者穹禍淫福善噫何斯言之或謬歟籛鏗壽而顔淵夭盜跖牖而嵇康刑屈原寃而文考溺冉惡疾而左喪明胡其然哉胡其然哉伏惟明靈栁蔥松峭山嶷鶴孤落落君子行行魯儒始者辭鷗西邁希鵬北徂高高蟾桂赫赫鴻都和贄之寧三泣宋盧之俟一呼而以氣直志大數竒道汙大中季之計車奔走咸通際之名路﨑嶇於是涕唾聲華毫釐簪笏枕中罷競於名位壺裏别窺於日月東尋玉籙則龍虎嵳峩南訪金沙則羅浮突屼北固風清西陵月明蘭舟泊岸金磬飛聲塵埃謝傅之叔姪夢寐茅家之弟兄古觀秋住靈蹤日行松下之齊宫肅肅雲山之醮火熒熒罏燃北癸鼎化西庚羽人傾蓋府帥投誠說浙西周體范居陶象端適衛蓋婚嫁之須了匪貨財之所繫愈高雲鶴之逍遙益笑匏瓜之繫滯何武江都蕭牆禍儲羊腸莫守蝸角旋孤說淮南高蕭條陳蔡之圍聖賢大困惆悵昆崘之火玉石俄俱綿邈吳山蒼茫閩海遽聲沈而響絶荐時移而歲改絡秀愁積孟光泣倍山頭之鶴駕無覩水底之鯉書空待宅相征輪梁園洛濱見徐甲之移主知伯陽之蛻身海山失翠烟樹亡春某竊惟早歲忝拜清塵䝉以拾青相器投漆相親鑒羲之必晉朝名士識陳平為漢代英臣爰將淑女俾結嘉姻十載不攀於桃李兩誠空貫於松筠愚以感明靈之殊義戴明靈之至仁金重季布枝輕郤詵逡巡東越拖擲西秦實期歸釣嚴灘終棲鄭谷戶外山碧樽中酒緑將仰止於樂冰冀參差於衛玉豈意寂寥音信髣佛幽明聖人之齊始卒君子之一枯榮天上之鵲橋宜度人間之鴛被須成開簾鳥囀回轡蜩鳴東牀則黯黯愁色南渭則哀哀哭聲嗚呼哀哉平生氣槩昔日忠貞龜齡曷昧駒隟斯驚在物之理豈人之情愚輒疑道家有形全氣全兵解木解考斯事矣或其義也不然者胡埋南祖之蛇罔念北翁之馬嗚呼哀哉列塜開阡重泉九原古之所制今也斯存伏惟明靈魏夫人遺蓮鋒而取喻葛仙翁塍竹枝以為論固以神遊蓬島洞入桃源然則不樹松柏罔貽子孫是用葬喬山之冠劔招湘浦之精魂滕公啓室宋玉申言曰楚山青兮淮波緑劉雞飛兮隨鷁覆遺蹤脫屣辭彼俗楊栁霜多不堪矚螺江淺兮甌山隂繼升天兮徐董任風為輪兮雨為轡東歸來兮北追尋陳桂席兮奠椒漿樹馬鬛兮開夀堂千秋萬歲兮舊江鄉魂歸來兮山之陽詞咽淚迸猿悲鳥傷東波送恨西日沈光雪耀霜明而莫覩芝焚蘭爇以空芳孀妻捧奠出女尸喪嗣男而杳杳江嶺鄙子而明明肺腸劔以求心而克許樂以悲告而寧忘願明靈之冥感鑒蘋藻於壺觴嗚呼哀哉祭崔補闕道融故右補闕博陵崔府君之靈惟靈大唐有進士科無巖穴詔故鵠版之降不易其人元和之起也則有陽諫議城凜凜清風其不起也則盧諫議同昭昭高道一以權豪之忌空福道民一以堯舜之世但樂箕潁其後陸君汙以忠勳應召惠君實以忠諫赴徴未委起草伏蒲何如人也洎博陵崔君之生也迥稟高竒兼之文學近則繼李飛之蛻隨貢逺則同毛義之志奉親東浮謝公舊州式避戈㦸遁於仙巖濬谷克業經綸而以酒美肉羶澤馨川媚五避三顧懸榻開樽不辭小國之權蓋切高堂之養既而大君之思夢說四輔之急薦雄繫三詔而就門參七人而列職仲舒謁帝必演春秋吕望投竿定為師傅奈何龍蛇起陸烏兔無光莫扶劉氏之宗祧空泣袁安之涕泗甌中越絶養素守䝉賢王之結嘉姻時議之期良輔豈意皇天不祐白日無憑消渴之亟茂陵少微之入瑤桂芝焚蘭爇梁壞山頽雖人生之有定期實士德之為不幸嗚呼閩中二月烟光秀絶脂轄赴闕鯤鳳嘈囋其猶南浦魂斷北梁涕咽而况昨日軒車今朝塗芻唱薤露以出門飛粉旌而戒途五離擇日九泉卜居其在樵蘇其在博沽至於路行尚皆悲吁矧其嶽嶽之曰男子鏘鏘之號魯儒識通龜䇿握耀蛇珠數百篇有唐之詩數千字中興之書國風騷雅王佐謀訏沈光之猶衝斗垂翼之未摶扶賫志殁地其痛何如雲物為之無色剛忍為之不愈某飲風永嘉傾蓋無諸多君於士元廊廟待我以叔度陂湖交言既異投分斯殊方俟彈冠仰修程於霄漢誰云執紼悲落景於桑榆豈鬼神之害良善而吉凶之昧賢愚顔回先死盜跖後殂世之災眚生之毒痡愴恨風燭淒涼隙駒肴匪豐俎酒匪馨壺歎松蒿而永往託蘋藻以聊舒明靈有感鑒而歆歟巳乎巳乎嚱嚱祭陳先輩鼎惟光化四年歲次辛酉正月二十七日祭于陳君之靈閩山秀氣魯國清塵天之授受鍾我仁人卓矣生世學而立身衛玠則旁輝其舅曾參則大孝於親始者隨計歸越上書入秦擅價而侯門傾動呈功而鳳藻精新咸通之年九霄也鷁路乾符之際萬仞也龍津既而甌嶺經兵蜀川迎帝匪無隨駕之懇實切問安之計肩負燋飯志銷丹桂雖深藏豹之誠難遏化鯤之勢都堂昔日困一千輩之交鋒大國中興作第二人之登第杏園醉後華表歸時往嵗井邑兹辰羽儀旋屬姑蘇積舋勾踐興師於是板輿避地草檄從知百越之江光洶湧四明之山翠參差長鯨既剔逸足難羈東别朱門南還故里一朝而奄至泣血三載而蔑聞見齒仲由此後千鍾之祿悠哉毛義終身一檄之榮巳矣修程不顧盛德逾馨田園草緑戶牖山青與䕫龍而抗跡追園綺而忘形且期齊鶴算壽陟龜齡是何修短之期莫測吉凶之國難扄明神罔祐大禍斯丁士林慘怛詞苑伶俜某始自童年至于壯嵗江鄉為竹馬之友京輦作谷鶯之㑹三朝被刖棲遲泣荆璞之艱十上遭時次第到瑤蟾之內誰言倐忽遽嘆存亡痛人琴之俱絶緬膠漆以空傷嗚呼用新平生德行曩昔文章近則孟浩然雖人間不仕逺則卜子夏乃地下為郎誠以高科而貞退固從隂隲以舒張逝水東流踆烏西匿昨辰而椒桂獻酬今日而藻蘋滴瀝且彭祖之延永夀亦至銷磨而巨卿之哭故人得無悽惻況乎東西多故南北遙程不得親隨薤露送别於塋既闕殷勤而執紼空將嗚咽以沾纓謹以依稀蔬果一二精誠願冥符於肹蠁申永訣於幽明祭林先輩用謙維光化三年歲次庚申十一月曰敬祭于林君執光之靈惟靈夫渥窪之足以千里之為程巳馳之而俄沮嶰谷之音以六律之為府既參之而忽泯夫不永其終始何痛如之嗚呼林君得以言矣君負相如之詞賦慕郤氏之科名一紀秦城千門禰刺雖衆口大馨其鳳藻人罕如焉而三春纍困於鶯喬數何竒也然則女貞而十年必字藥靈而九轉須成果契至公克升上第既巳東堂得意南國言旋龍珠則動彩於握中雁序則增輝於天際將冀盛清風於吾道豈期歎逝水於人生屈原之難問者天蔡澤之不知者命螺江煙景方翻丁令之羽毛駒隙光隂俄啓曾參之手足誠壽夭靡移於夙契且鬼神何害於善人禍福吉凶悠揚曖昧凄涼物理慘怛人情今則壽域斯開貞魂永蟄壠頭水咽山上雲愁鄧攸之繼世無兒語留身後崔曙之遺孤有女詩在生前雖衰盛之同休亦存亡之至痛某京關進退硯席參差幸忝先鳴彌欣繼捷未賀桂枝之入手忽從薤露以傷心修短有兹吁嗟何極靈輀戒路丹旐翻風逺寓丹誠聊陳薄奠願垂冥感鑒歆於斯嗚呼哀哉祭右省李常侍洵惟靈金石呈姿陂湖稟量伊彼昭代生乎德門膺河清嶽峻之期擅賈虎荀龍之號時稱最怒賈家三虎偉節最怒家謂無雙月中則桂樹連枝日下則鴛行接翼故得鄰家醜婦競顰西子之睂洛下諸生皆掩謝公之鼻為大廷之領袖定千古之風流既而魏闕飛塵蜀都迎駕雖則急賢于行在而志作賦於閒居留連霅水之煙波容與松江之嵗月其奈珠以川媚蘭於澤馨從吳苑之琴樽疊堯天之雨露金臺蒲省驄馬螭頭誠幾三顧以就門猶作八元而在野其後七升赴命二妙對敡天駟呈材蛟龍得水入鼇山而侍從登鳳閣以優游名由實生位以德舉天子乃擢王褒為諫議升孝若於貂璫前彰潤色之功後養燮調之業旋以欃槍未落岐雍多端忘越嶺之﨑嶇慕荆州而倚托東閣之留連斯重北轅之行邁方營誰料彼穹者天俄奪之魄漳濱一鬼驟苦劉楨殷氏兩楹遽鍾夫子山頽梁壞璧碎芝焚雖人世之死生實士林之摧沮今以湖湘梗澀伊洛迢遙北邙之路連天松楸莫附南巷之號至血丘壠權宜煙雲慘淡於原頭猿鳥悲涼於林際某曩從上國獲戴殊私近慶外藩薦承厚顧每佇十旬之入拜寧期二豎以來攻彭殤雖謂其同休幽顯其如乎永隔靈輀戒路丹旐翻風昨辰而椒桂獻酬今日而蘋蘩滴瀝人生到此天道何言雙淚空流九泉無曙東波嗚咽西日蒼茫輒寓兹誠謹陳薄奠敢祈冥感髣佛歆斯祭司勳孫郎中惟靈趙璧呈姿隋珠稟價為乎國器生之德門劉家則三嘏揚芳馬氏則五常擅美故得數枝郤桂交茂鴒原一本田荆分輝雞樹理窟則曲臺得雋寶人則華省垂名繇是迥拔蘭宫騰光水鏡臺推二妙日俟七升不幸岐雍多艱干戈未偃補傾乏石救濁非膠爰攀雁序於五湖因轉驥程於百越誰料皇天不祐彌薾斯縈遽折椿齡俄隨薤露山頽梁壞芝爇蘭焚雖修短之有定期實簪紱之為至痛今則江湖梗澀京洛迢遙權卜靈岡寓安壽域川上之東波嗚咽雲間之西日慘悽大夢莫回下泉長暮某早于輦轂歷踐軒牆旋振羽於丘門獲陪塵於阮巷顔回短命既恨當年溫氏冥裝復從今日人生若此天道何言涕淚空流幽明驟隔嗚呼哀哉輀車明發丹旐晨飛輒憑蘋藻以寓誠用薦塗芻於永訣願垂冥感髣佛鑒歆嗚呼哀哉祭宋員外故軍倅觀察推官檢校主客員外郎廣平宋君希邈之靈惟靈物有盛則有衰人有生則有死古今不易之數毫髮無差之理然則厥壽苟百壽終則滅厥身苟修身殁名留是以顔子夭而其言不朽原壤老而於道何求吁嗟希邈藹然清休蘭杜敗而終馨松柏折而終秋德木千尋人材八尺敻雲鶴於風裁濊陂湖於胸臆既而臺築黃金禮先白璧為席上之至珍運幕中之婉畫洛水波清泉山翠橫優游五府輝映雙旌兩地之隆崇物望一方之煦姁人情繇是入曳珠履出居武城尊俎克彰於令譽絃歌迥振於嘉聲才業大聞君恩薦至爰從棘寺以寵陟旋慶蘭宫之澤被丹鳳飛詔銀魚受賜雖棠隂蓋地能資樹德以行春而醴酒疊觴終以持盈而戒意九仙樹碧八座塘深駐清源則一府延頸赴無諸則一郡沾襟嗚呼希邈持何道致人如斯之欽豈非秉仁義忠孝以行巳無是非毁譽以萌心者哉奈何晉公二豎漳濱一鬼惡去藥石之內樂入膏肓之裏冉耕惡疾以相攻長卿消渴而不止艾煙百冗藜杖二年禍被三彭之所迫靈非九轉以寧痊嗚呼哀哉石火風燭驚波逝川誠修短之無改矣奈痛傷之有等焉芝焚桂爇璧碎珠捐至於行路孰不涕漣愚一揖清塵偏容瑣質初憐淡以如水後乃投而若漆十年之寒暑無變三益之金蘭愈密洎夫秦城駐跡儉府叨招竊惟上榻幸忝同寮南二隼旟雖寄懷而稠疊北依龍節終積戀以迢遙沙岸迎歡津樓送别且言不日之後㑹誰料終天之永訣人生夢幻夫復何言世路存亡難勝痛咽嗚呼哀哉昨日而箋函寓意今朝而蘋藻興詞駒隙之光隂如此龜臺之學習何斯幽明驟隔音信無期加以道路修阻弓旌縶維慟哭寢門而莫逮叫號穹碧以奚為聊馳一奠之椒桂用叙千秋之别離噫嚱噫嚱巳而巳而祭錢塘秦國太夫人惟天復二年歲次壬戌敬祭于故秦國太夫人之靈夫生帝王則若文母方鍾至聖生人臣則若陶母方降大賢信夫韜昴宿之耀於胸襟掬嵩山之氣為懷抱豈容易哉伏惟明靈天資婦道神授母儀金石不足喻其貞明芝蘭不足表其芬馥訓逾孟織智邁謝圍顔氏子則提育聖人曹大家則師資諸女既作閨門之上瑞乃生英傑於皇家立曠代之鴻勳擁兩藩之龍節食則萬錢調膳祿則三世及親見綵衣則衣錦之姿見冰鯉則和羮之味騰輝女史興詠國風推於古今實無倫比乃由懿德致此大榮嗚呼靈藥難求流光易謝本冀霜松而永壽忽驚風燭以斯零竟成舉世之悲傷空切至誠之號慕某幸攀令嗣獲忝親鄰論交既契於金蘭抹泣乃同於親屬輒陳薄奠用表悲誠敢冀明靈依稀歆鑒祭南海南平王代閩王故南平王之靈惟靈五羊奧區畨禺巨壤漢為列郡唐作雄藩總百蠻五嶺之殷有出將入相之盛是故地啓嘉數天生大賢濬六韜三略之才謀韞五袴二天之政術俾其於家受詔衣錦禡牙控二十四州之繁難當二十八齒之美茂光揚千古冠絶一時鍾其明靈其昭昭矣至若恢張霸業揚簸清波臺陟九層靡慚郭隗劔提三尺授自吕䖍爰持副二之雄姿遂領節旄之重寄繇是澤施甘露令肅秋霜掀文房武庫以連雲騰逸氣英風而偃草上榻則阮瑀下賢則左車從善則軾閭宣威則斷案故得越伏波之銅柱獻欵而來感鄂公之鐡鞭呈祥以見火山改色珠浦生光無煩處默之酌泉大鄙趙他之纍土然後鳴鐘出入調鼎升聞致交趾之封疆歸石門之教化九遷渥澤克居浴鳳之池雙立節旄逺過跕鳶之水雖士鮪列弟兄三地山簡兼荆湘四州語未同年事推曠世嗚呼是何才德之若彼功業之如此而彼穹者天不壽其齒畢雲龍之契㑹與龜鶴而等倫矧天子方欲使降皇華恩宣金册表裏東周之盛旌崇南越之隆胡二豎之急攻竟三醫之莫救泰山頽壞俄興孔氏之歌漢水凄凉遽罷羊公之市實國家之不幸實藩鎮之不幸某早塵與國旋忝睦鄰雖瓊樹之未親若銅盤之已接方定金蘭之至分豈期幽顯之驟殊況以幸結良姻纍交專介幕下崔員外昨馳禮幣嘗詣門牆爰䝉執手之歡宏叙親仁之㫖今則遽悲存殁益歎彭殤故將荐舉征塵躬申薄奠九泉注望於歎逝以難勝五月指期表同盟之必至嗚呼哀哉曩馳羔雁今遣蘋蘩伊人事之有兹顧痛傷之何極然則荀龍賈虎大馮小馮雖嗟松壠之長歸終慶荆枝而繼茂永言歡好寧怠初終幸明靈之一臨鑒此丹赤嗚呼哀哉黃御史集卷六
