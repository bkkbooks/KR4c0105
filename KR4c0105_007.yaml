body:
  text: 黃御史集卷七唐黃滔撰書與王雄書蒙示盛文拜納之日焉可無言某不業文誠可儷偶其辭以贄方寸既再而思夫儷偶之辭文家之戲也焉可齎其戲於作者乎是若揚優喙干諫舌啼妾態參婦德得不為罪人乎是乃掃降聲律直寫一二強名曰書幸垂聽覽頃越之苧工遊蜀之錦肆錦工以之示肆人皆哂越工曰誠紝雪之與梭霞異諸然其經緯之如此文章之若彼咸言其極某今獲閣下之文雖莫我知亦庶幾於越工之言蜀錦至如典謨之比寧敢輒言若復韓校書兩寓沈先輩永崇髙中丞安邑劉補闕已上十篇書指陳時病俗弊敘述飾躬處已講論文學興廢指切知已可否雖常人俗士聞見之亦宜感動况吾曹乎則知綿十舉而未第者抑有由也夫以唐德之盛而文道之衰嘗聆作者論近日場中或尚辭而鮮質多閣下能揭元次山韓退之之風故天所以否其道窒其數使若作騷演易皆出於窮愁也復何疑焉今之人皆謂番禺駢寶貨遊者或務所獲某之來也得閣下之文為至寶竒貨充所獲豈不厚於它人哉願閣下脂轄躍轡薦計貢闈髙取甲乙然後使人人知斯之寶貨異於是也元次山韓退之之風復行於今日也無令鄭濬孫泰李瑞閔廷言陳嶠數公寂寞而巳幸惟志之不宣某再拜答陳磻隱論詩書隔違之久每思陸凱之風雅馨香故人秦樹吳江梅花一枝為之寓某無陸君之風雅有故人之馨香越山台嶽去年輒以詩八首為之贄昔陸氏蔑范君之報今某切希畋之瓊瑶不知何以勝據焉况四始六義之莫備匪萌是望伏蒙希畋錫以長箋飾之過詞不勝其驚悸而後踴躍也敢一二陳之某始者匠故交之為詩希劉咸通季初貢於小宗伯試禹拜昌言賦翼日罷特持斯賦於先逹之門忽叨見錢之目俗云以詩為末錢而市物以賦為持錢而市物是時張喬許彬林希劉皆咸有詩名而退飛不巳某既竊其目尤疹二三子落空拳之所不敢俟終日遂更以賦數年以賓榻之無才畫勝景之多餘暇不能忘情於舊輒薦披榛焉于以寓誠敢期希畋之是知乎錫以長箋飾之過辭初捧之而驚悸旋諷之而踴躍踴躍之謂如見古賢焉何也希畋示以先立行次立言言行相扶言為心師志之所之以為詩斯乃典謨訓誥也且詩本於國風王澤將以刺上化下苟不如是曷詩人乎今以世言之者謂誰是如見古賢焉况其籠絡乎天地日月出沒其希夷恍惚著物象謂之文動物情謂之聲文不正則聲不應何以謂之不正不應天地籠萬物物物各有其狀各有其態指言之不當則不應繇是聖人刪詩取之合於韶武故能動天地感鬼神其次亦猶琴之舞鶴躍魚歌之遏雲落塵蓋聲之志也琴之與歌尚爾况惟詩乎且降自晉宋梁陳之來詩人不可勝紀莫不盛多猗頓之冨貴疊隋侯之珍不知百卷之中數篇之內聲文之應者幾人乎大唐前有李杜後有元白信若滄溟無際華嶽干天然自李飛數賢多以粉黛為樂天之罪殊不謂三百五篇多乎女子蓋在所指説如何耳至如長恨歌云遂令天下父母心不重生男重生女此刺以男女不常陰陽失倫其意險而竒其文平而易所謂言之者無罪聞之者足以自戒哉逮賈浪仙之起諸賢搜九仞之泉唯掬片氷傾五音之府只求孤竹雖為患多之所少奈何孤峰絶島前古之未有咸通乾符之際斯道隟明鄭衛之聲鼎沸號之曰今體才調歌詩援雅音而聽者懵語正道而對者睡噫王道興衰幸蜀移洛兆於斯矣詩之義大矣哉若某也誠未足與言而巳矣自向叨希畋珠丘金穴口諷心降之言其復家傳奧言身周雄文者乎乃惶惕銘戴之無窮伏惟察而憐之不宣某再拜與羅隱郎中書故表丈遺文盛序古人之重存殁爰捧諾金感涕之誠實刻肌骨然以郎中十五兄相逢京輦得志金蘭雖備熟於行文恐未周於平昔而某以內外之戚始終所詳敢以小才為之前序誠以麟經下筆諸生而不合措辭而馬史抽毫漢代而還陳别録伏惟慈造必踐前言西望禱祈可以鑒料啓南海韋尚書某伏念髙為碧落詎側管以能窺深作滄溟固持蠡而莫測焉可爰齎瑣智直杖小才敘昴宿之鍾蕭述尼山之降孔既將越禮誠可加刑然則有曠代之遭逢獲千年之際會設若旁扄辨囿內遏言泉不惟上負於良時抑亦下辜於卑志是致齋身搦管沐髮裁辭伏惟尚書象外三山人間七寶體天地方圓之製法陰陽升伏之機自從見作人龍翔為鳥鳳騰輝瑞牒流慶皇家文章則遊夏固遷事業則伊臯周召飛揚天上踐履朝端且自古六官所重莫先於吏部逮今二職所難無出於侍郎而尚書五陟東西兩司銓管矧復品量庶彚選度羣材載萬乘之安危繫四方之休戚晉魏則大難斯地國朝尤不易其人厯數除書少聞再命朝廷不欲止於鴛省便入鳳池須加分閫之尊用飾作霖之盛特以畨禺巨壤南越名區外控蠻陬旁通畨貨昔者石門酌泉之事合浦還珠之風日月遷綿規程革易以尚書勵辭玉留錢之節執投香載土之心用將揭二賢亷潔之波新五嶺﨑嶇之俗俾以佩豹韜而直下建龍節以遐征非止鎮臨且申龜鏡昭然足驗儼若可觀然後飛驛騎以徵黃降鵠書而命説恢張帝道陶冶生靈所以知髙祖創基太宗纂業更得無疆之祚仍歸有截之風何以言之伏以尚書萬頃包含千尋峭拔膺嶽峻河清之數切飲氷食蘖之誠識洞古今居無喜愠將以鏘履聲而朝紫殿擴心稱而啓洪鈞自然道臻於堯舜羲軒時復於禹湯文武百蠻向化萬國歸心雖在愚蒙亦能辨識而某器同魏瓠凡若莊樗握無蛇口之珍額有魚身之點今者遽持幽賤獲覲旌幢競營方沗於拂塵奬遇旋叨於薦賦且凡開場試士就鋪屬詞從物外之課虛向燈前以應限縱若仲宣閣羣公之筆長卿量陳后之金空有所長或聞未至况某雖勤篆刻且昧精竒張平子固合陋都陸士衡所宜撫掌寧期尚書親回嚴重庭賜褒稱變泥沙為丹雘之姿植菅蒯作芝蘭之秀魯史驟榮於一字晉庭俄採於片言超越尋常震驚流輩况方今武功草偃文教風行計奔嵗貢於九州榜擢詞人於都省至如生於草澤來自溝塍或能中甲乙科求登殊尤選蓋止於同人延舉先達吹噓未嘗有聖日名侯大朝重德面開金口首借丹梯以此推言便宜自賀瑶枝玉幹虛扄皓月之中羽駕雲裝寧遁碧霄之外巳知蹇步可造遙程藉以宇內迹單天涯親老一旦有茲殊遇得此吉祥買臣何愧於負薪毛義實榮於捧檄感深唯泣喜極翻驚瀝膽隳肝空寓鄭莊之驛糜軀碎首何禆元禮之門攀謝兢惶罔知所措下情無任戰越悚惕屏營之至薛推先輩某體物非工屬詞無取每欲效顰於越女常思裂撰於靈光今者先輩提江筆以雲飛擲孫金而羽化賢愚塞望逺近騰聲凡是懷刺來人操觚學者莫不競為市詣爭作鏡窺所以恥不遊門勇於執鞚遂投鄙拙上瀆精竒佇聆架屋之譏莫俟披沙之諭豈料蔑聞撫掌翻獲知音林先輩至伏話仁恩超越涯分對彼鶯遷之侣當于鳳集之時遽起蘭言爰開金口大垂激發曲賜吹噓榮邁序都事逾折簡傾身聳聽局影瞻風如飛氷雪以清心若韻笙簧而到耳感深旋泣喜極增憂未知腹蟹行蹤巢蚊寓迹獲采片言於叔向何酬一字於仲尼雖切朝暾尤加夕惕然而伏念近世以科網英髦榜張取捨雖例從都試實採自衆聞故其負藝而來懷才以至是皆閽投哲匠神拜先鳴苟有所稱便馳殊譽然後方沖桂月遞躡蓬山如某今則有此遭逢受斯奬録來從特異出自非常便可釋疑永將去惑雖慙陋質粗抱丹心既得地以戴丘倍推誠而倚玉在面陳而莫盡於筆寫以寧周攀感依投不任榮懼謹詣宅祗侯起居陳謝刑部鄭郎中二首某學異生知才非夙搆雖叨進取莫俟遭逢郎中模楷詞林梯航名路每慮或遺於片善常憂不採於一言比者伏蒙曲念虛蕪榮流咳唾誨以磨鉛未至刻楮非工冥心於雪夜花朝空徵六義屬意於國風王澤罔造二南將令罷課緣情回從體物伏自穰城去騎灞岸歸蹄時邁青陽景融朱火於是凝神扣寂間迹探幽蓋希副非次之恩知非敢切平生之志業昨者伏遇南宫拜命北闕朝天豈惟上賀於髙翔仍喜旁陳其末藝永期指教畢願攀依而以淺近懷慙雕鐫積愧前而復卻決以還疑空眷戀於門牆竟遲回於書幕今則難逃皎鏡須詣平衡冀分妍醜之姿式定重輕之品伏惟特固朝暾之旨俯憐夕死之心薦賜發言重將辨惑臨風股栗伏紙心沖傾寫依投不任激切試賦一軸謹詣宅祗候陳獻又伏惟郎中樂府至音儒家上瑞既負雄文於卓絶仍搜律韻於精微始者袖入名場騰於人口以謂若生逢孔氏偃商則失於四科出值毛萇周召乃慙於二雅實已當千莫讓而又恥一不能復以餘波濡於體物字字並凌雲之勢篇篇皆擲地之聲大使前哲懷慙專工積愧某業非精至藝本雕鐫猥蒙仁恩曲賜借示自旬日已來齋心繕寫沐髮吟哦愈盡頭風沉成心醉且杞國回船之妙千古所稀而泥金禹闕之竒三篇不偶是何摛華若是翻驚失手於斯則知用兵而管仲三奔射䇿而孫𢎞十退豈戰之過蓋時所違此乃今古玄機聖賢定數契日月虧盈之理等陰陽升伏之期用以否其道而泰其身窒於前而通於後逮今一人側席四輔求才則煥爛除書飛入雲山之裏昭彰懿德馳歸省闥之中徒恨傷麟終幾失馬若無往嵗焉有茲辰遂使一換暄寒三更揚厯頭居東署首列西曹皆是重難無非清顯既明前事因卜將來佇當潤色絲綸翺翔近密輝飾於典謨訓誥啓陳於堯舜禹湯鎮壓澆風恢張吾道凡居進取皆切攀祈况處恩知豈任禱祝所歸公望非自私誠賦集謹詣宅起居陳納謝試官代人作伏念鬻雞為鳳有識咸驚投礫參瓊良知足鄙豈可髙懸皎鏡逈揭平衡而乃呈六極之陋容挂一絲之蔑質得不臨風扇面對景忡心然巧冶開爐莫遺鉛鐵精工執斫不問圓方又安可內鑰言樞上辜德宇是敢因依借喻一二披誠某蜩甲薄姿蟻封微狀學雖勤於刻汁藝則愧於鏤氷徒以獻豕辭遼齎花躬魏稅駕而旋同飲鱉操弧而果異麗龜遂至千仞禹門額蒙點鋭兩朝楚國足被刖空竟於豐獄以沈埋誰以蜀桐而激發伏惟博士鳴岐瑞質歌郢至音蔥籠而張栁風垂迥拔而嵇松雪峭自提攜江筆鏗擲孫金投身而傾動龍宫揮手而振驚蟾窟時爭墊角俗競嚬眉今則珠履賓階玉京羽駕欲髙飛於魏闕先下厯於虞庠故得槐市三千杏壇七十依於考擊竊彼飾禠而某丘錦小才路蒱末學既非禰鶚大懼溫犀固當絶望超隅甘心滅刺然則嘗彈流水罔協鍾聰曾躡浮雲莫回樂顧是亦難參雅調不號逸群矧其器乏正聲價懸駿骨苟叨明試不偶至公則異時何路以致身他日無門而振迹坐為棄物立謝明時是乃洞寫血誠仰祈風鑒伏惟博士曲垂厚顧猥降隆私將憐其蚌蛤剖胎只自回旋於皎月螳蜋奮臂無辭殞碎於髙車非敢染黿所希留馬干瀆清嚴下情不任惶惕屏營之至盧員外潯昨輒以近試賦輕黷門墻韻匪擲金理宜誚石豈期轉禍為福以寸獲長户部鄭郎中伏話員外仁恩大賜奬録拜聆嘉耗跪對吉辭感惕兢惶進退失措實以從古干時之道至今取第之由莫不路邈鰲頭程懸驥尾苟非先鳴汲引哲匠發揮縱或自強行將安適伏以員外斷籝積學計斗負才龜鏡詞林梯航陸海是故門駢鄭市俗墊郭巾爭俟栽培互希丹飾而某牛涔淺狹燕戲微茫豈合攀投徒為激切員外燕中市駿稷下館人皆使有歸不言無取猥流厚旨曲降隆私某是敢引事推言徵文借喻且傑如韓信未歸漢祖以誰知美若西施不入吳宫而孰驗所以蟄劒而凌虛吐耀焦桐而駭耳飛聲然後感動良知遭逢至鑒事雖小異理或大同伏惟稍降尊嚴俯垂惻隱如某昧為貢士淺作丈夫方今不右武功大先文教矯辭人於鶯谷鑰宗伯於龍門其有負馬之文華韞顔之德行或栖栖以至或嶽嶽而來未嘗不坐馳日下之名立貯彀中之望是何謝茲振發而處彼幽沉頻年厠角逐之場衆口蔑殊尤之譽齊國篲秃荆山眼枯漸覺途窮虛云舌在豈可堅期御李確慕依劉志空切於投林醜難逃於側管伏惟員外魏車委照軒匣揚光儻憐其刻意探幽焦心體物雖則異於披沙之説然略幾於架屋之談許列書筠令參撰杖今者或因薦士敢乞編名所希從數仞牆伴二三子增輝瑣質擅價主人皆由一顧之仁翹佇百金之諾含毫汗下伏紙魂驚非切覬覦所憂誅戮叨越干犯下情無任戰懼屏營之至侯博士圭某口諷雄詞心祈藻鑒在他處則早逾一紀來上國則已逮二年常側管以推誠每持蠡而注念蓋期御李非敢希顔所以竊贄荒蕪荐塵墻仭聳蟻封於丘嶽疏蛙渚於陂湖敢望吹噓佇聆誚責昨日進士林郁忽傳尊旨遽話殊私伏惟博士曲降恩知俯回奬録不置蓋甌之地爰興讀霓之言事邁常倫榮過始望傾身拜命局影瞻風若聽咸韶如吞甘醴敢便認為知已蓋將決定胸襟實以當今文教風行詞人輻輳莫不俱陳素業各務所歸而博士負擲地鴻名標掞天逸勢吐楊雄之五臧陋班固之兩京故其接踵望塵駢肩執刺爭為稱挂互作鏡窺或聞由也升堂賜之入室是則千門改觀萬户飛聲若瑶璧之飾來類金絲而振出所謂功侔造化言繫慘舒作詞林培植之家為陸海梯航之主必當不私其一顧誤彼衆聞以某數載卒勤一生疑惑唯傾丹懇翹矚重言冀將卜以妍嗤斷其可否今則出於門館發自齒牙事既殊常道方自信析音倐同寐覺敻若神通呈材之獲般窺鬻馬之蒙樂顧已逢哲匠肻愧他人蜀璧端居管牀兀坐既佩茲謦咳益勵彼顓愚苟無疑於鏤氷則求工於刻楮忭躍兢悚罔知所裁下情無任感恩激切之至蔣先輩二首某自違門仞尋逹家山拜慈親而聚族生光述𢎞造而一時泣下蓋以生平事業出自宗師豈惟特異之恩知仍契非常之事分昨者齎持惡賦刺謁清塵本期劉子俊家待以蓋甌之地陸士衡處置於撫掌之間豈期以寸獲長鬻駑竊價伏蒙校書先輩驚人賞録越等褒稱篇篇而喻作金聲一一而讀為霓字迥施異禮疊錫嘉言及門則倒屣於仲宣侍座則授經於左氏周旋許與覼縷指揮畢令如蘿附松更使以膠投漆俾從秋賦首出門墻顯示輩流别加援引且古人之慕元禮才獲御車學者之師仲舒未曾識面以斯修省莫有比倫永言遭逢得謂卓絶矧國朝之設科待士較文取人往嵗主司則斷於獨鑒近時公道則採自衆稱繇是重望朝賢有名先逹得以主張斯道梯級將來至若有負兼才且非所業或文章而稱詞賦或律韻而談古風猶自彼唱此傳影隨響答其况專功與善本面説人又若校書先輩鳳藻凜天鴻名傑俗今時賈馬昔日班張猶在場中多士便瞻於咳唾既行天上一言何啻於興衰當以調啞使鳴吹寒令暖伏自歸寧膝下駐迹江干白日思維中宵起坐既名為得路當别議感恩况緣家邈東閩路遙北闕一回逐計數載違親頃者纍繕蕪詞厯投碩匠或蒙開口少值動心以此鼓勇無門自疑不暇今則從大藩之賓榻得當代之主人豁如釋氏之破迷醒若神醫之愈疾一家相賀舉目增輝進取有茲肺肝可察伏以上京迢遞難於獻嵗支離須俟新春方議假道進發藝馨酷烈蓮幄清虛昨陪侍於遊從今綿隔於煙水别無言語併陳於殷浩函中空有夢魂常繞於燕昭臺下又某伏念希逸知名於靈運不作門人左思擅價於士安非為弟子雖則清風凛若懿範昭然得將為千古髙談未免是一時闕事翻思到此因敢形言某齎持淺蕪塵觸門仞遽竊披沙之諭爰蒙折簡之知事實驚時榮將越望而又謂前賢之未至垂厚意以特殊將令别議依投用堅恩德資今日顧憐之旨作它時汲引之由苟開如此之懷豈是偶然之事赫赫昭代鏘鏘衆人榮持哲匠之發揮薦向良時而角逐則何患龍宫之杳杳何憂蟾月之髙髙足以雪曩嵗之湮沈恢張禰刺壯平生之意氣棄擲終繻如此若不激切擎丘淒涼誓劒豈謂修文學古何名勵節砥躬伏自虔侍清塵仰叨殊遇未嘗一夕不將心禱於神明縱極千言難以筆書於丹赤攀謝感激罔知所容楊狀頭贊圖某驟持末學遽竊殊知伏自豫章數旬湓浦一路扄旅舍而夜唯假寐逐征帆而日但沾衣蓋以虔戴遭逢仰思情旨先輩主中興之文學作來者之蓍龜伏蒙採某所業異於等倫憫某所舉困於曩昔大張金口精發瑶函且午火燒空一陰司月面泉石或病乎炎毒處城池而奈彼鬱蒸况土風則竹屋玲瓏煙水則葉舟蕩漾才曉而烏光赫透欲風而魚沫膻飄雖付於醴酒酕醄或亡杯混又屬其羽書重疊時觸髙明誠知不乏餘波爭奈罕聞暇日豈可更抽祕思别運真蹤每摛一幅之霞箋咸滴千痕之雨汗雖才髙倚馬曾無起草之詞而字悉如蠅幾苦生胝之筆未知單賤何補生成齎行而便是金丹舉步而即升雲漢矧復公言私論要訣神方一一指蹤頭頭傳授將克周於頂踵俾無失於毫釐以此推恩而前古所稀以此行道而方今誰比士林名路一朝有知已如斯白日青天萬世唯子孫為誓下情無任感恩泣淚陳謝之至代鄭郎中上興道鄭相伏念石甫受知於途中鬷蔑申言於堂下既情非曩舊復地隔尊卑尚能感動至公遭逢殊禮而某神資所向天授其時獲曠代之因依得千年之幸會豈可永緘丹赤上負陶鈞伏惟相公特降恩慈俯垂惻隱昔年羽化曾陪鶯谷之春今日雲飛俄隔鳳池之路信鶴雞之果異諒牛驥之終懸徒增倚玉之榮幾積續貂之愧况相公負英才而作礪持碩望以登庸始者四海傾心一人側席朝聞坐幄暮見飛霖扇澆薄為淳風激讒邪歸直道均施爐冶髙揭權衡使鉛汞之不參令錙銖之各等故得方圓任器髙下隨冝黜陟無偏賢愚有序某早甘退迹忽喜逢時遽從學省之前銜爰踐蘭宫之峻級已為塵忝誠合揣循竊思頃年九陌秋天都堂雪夜常容披霧每許參瓊逮夫片玉升科兼金列榜雖登龍羣彥同戴丘山而附鳳一心偏投膠漆既以宗盟屬意仍從知舊留情重疊依投綢繆奬録遂使慶鍾末路福逮今辰既預門墻仍從埏埴宛得御車之便無煩擁篲之勞但以某弱羽難髙么絃易斷始自筮仕及于登朝未嘗暫識清途略遊華貫亦人地之所拘限何窮通之切咨嗟洎夫郢俗褰帷穰城建隼連叨竹使尤愧棠陰雖早蓋紅旌别過素望而霜臺粉署終繫丹心今則榮竊握蘭幸當襆被馮唐厯踐誠知戴白之年貢禹棲遲且有彈冠之地代鄭郎中上靜恭盧相伏以天覆地載縱鬼神之奧皆臻陰伏陽升雖鱗介之微必動道既如此人焉忽諸伏惟相公持重器以為霖負英才而坐幄傳丹青於直道扇爐冶於至公致一物之無遺使萬方之有賴某顧惟瑣陋獲忝鈞鎔既契之於無私固施之於不報豈宜遽齎感激竊拜門墻但以事出非常恩從特異若不披於丹赤終有負於神明伏惟俯降尊嚴暫垂聽察某才非敏幹性本顓愚自從振迹春闈投身宦路徒綿嵗月莫致飛馳却則窮途前皆散地是亦用之則未為國士捨之則蓋類腐儒因自揣循每加退縮然而竊念古人不逺賢路非遙皇朝自科擢英髦爵升品秩其或來從草澤生匪簪裾亦常列入清途參為盛觀所以益持孤孑尤切兢修節勵松筠心傾葵藿常注目於煙霄之上每馳魂於省闥之中逮夫玄鬢凋空壯心折盡曾無影響空極瞻攀豈期相公才揭權衡便垂採掇俾遭逢於聖日令允愜於平生所謂材並得冝物無遺性信造化之功不及豈推遷之令能侔義貫古今恩逾卯翼况相公峻于埏埴切彼弼諧當今士兮如林朝稱不乏足得廓其公選擇以良才而某已懷耕釣之心近閇雲林之迹設令漏網未曰遺賢是何特逹開懷周旋軫念青山在目方將魚鳥以同歸鴻渥連天忽厯煙霞而曲被從杏壇之舊籍踐蘭署之清資豈是常情諒非小事伏自榮叨幞被幸竊含香未嘗一夕暫安片時不感常若千鈞之在頂每將孤劒以誓誠但以有地受恩無門瀝懇只􅒺髙車而激切空持弊帚以屏營淚則汍瀾心唯恐悚瞻風拜賜對景懷仁涸彼言泉固申陳而未盡託於筆札豈寫載以能周攀謝兢惶罔知所措代鄭郎中上令狐相某今月四日轉授刑部郎中伏蒙相公仁恩特賜寵誨事從非次言畢常倫感激兢惶進退失措伏以某材非可採藝不足稱出自門墻樹為梯級才榮地部復陟秋曹持鷦鷯決起之姿到鸑鷟曾棲之地相公憐其拙滯忽此騫翔疊降恩輝荐留手筆指今忝幸敘昔經過始者九遷曾假虞邦之道向來一字爰垂魯史之褒義極生成彩逾丹艧拜窺垂露跪捧隆私汗浹背流淚盈眥下未知順風弱力撮土微形獲參一日之髙蹤何報千鈞之重意唯謹緘於篋笥常誇向於搢紳為宦路之遭逢作仕流之卓異攀謝懇切不任下情代陳蠲謝崔侍郎某啓户部鄭郎中伏話鄭隱先輩專傳侍郎尊旨伏蒙於新除永樂侍郎處特賜薦論跪對吉辭拜聆嘉耗感激兢悚罔知所容某詞學疏蕪進取乖拙一叨貢士纍黜名場足間之刖處縱橫額上之點痕重疊今春伏遇侍郎精求俊彥厯選滯遺某又名礙龍頭迹乖豹變都由薄命翻負至公以此怔忪莫寧惶惑無巳在良時而自失於異日以何歸謂一生而便可甘心歎二紀而徒勞苦節豈料侍郎堅垂記録確賜憫傷令後人而副取前心指陋質而説為遺恨將使蔡經之骨終繫仙家士燮之魂却還人世蓋施陰德豈止陽功喜極翻驚感深唯泣明年春色致身雖出於他門今日恩光碎首須歸於舊地西川髙相相公嶽降宏才神資偉望象外而藹然妙旨人間而凛若清風當以四三傑於漢庭九八元於堯日聖上以南澄鳶水克仗英威西鎮龜城須資妙略所以未歸台輔且據重難巍峩兩地之勳冠絶一時之盛凡在中外孰不具瞻蔣先輩三吳煙水百越山川兵戈杳隔於音塵門館久違於趨覲空自明祈日月暗祝神祗相如徵出於上林賈誼召來於宣室不然者隱於商嶺棲向傅巖克俟搜羅直膺夢寐焚香稽首以日繫時某一滯江鄉六更寒燠都由惡命早失良時迢遞一名進取則大朝有難零丁數口退休則故國無家歸蜀還吳言發涕下沈侍御侍御麟鳳瑞姿蓬瀛絶境叔度與陂湖比量仲尼將日月齊明自飛翥九霄梯航陸海鄭門若市季諾如金為學囿之芝蘭作詞林之杞梓今則提攜陳檄登陟燕臺冠張豸角以巍峩幄折蓮花而照耀假途如此殊拜寧遙凡在人情孰不傾矚段先輩判官先輩萬頃襟神四科文行比鸞鶴而既沖霄漢喻龜龍而須瑞皇王今者賓幕清風士林重價雖欲留歡於五辟其如積望於九遷伏計即有新榮别膺殊命某蒙知既異感德常深辭違遽變於暄寒禱祝敢忘於朝夕又昨於道路纍附狀伏計迤邐上逹某行役近已到潮州伏以一路經過二年飄泊言則涕下靜而魂銷固非繫情於杯酒笙歌留戀於雲山煙水拋擲進趨之道遲回溫清之期伏計夙鑒如愚必當知不得已又安可逺含丹赤莫寓聽聞且聖代近來時風愈正取舍先資於德行較量次及於文章無論於草澤山林不計於簪裾紱冕少有三舉五舉多聞十年草年而某自厠迹其中且迷津不暇况乎來則無終軍意氣動則有楊朱路岐將卜一歸僅闕兩試人事如此光陰幾何先輩特賜恩知殊為誘誨時或軫念固應動心然亦否極則通彩來自聖他日而若無好命今辰而焉有良知唯當依倚栽培咨詢可否陳琳箋檄寧容久借於外藩夫子門墻虔俟再趨於上國賀正伏以司雞殷朔建虎堯辰仙人則飲柏延齡詞客則浮椒獻頌伏惟相公膺茲令節納彼嘉祥邵伯甘棠蓋地之芳陰更闊亞夫細栁連天之瑞色長新與青陽而同發生揭鴻鈞而普播物永貞國柄堅律師壇又伏以青陽變律乃二儀革故之辰獻嵗開正是四氣惟新之日伏惟僕射與春符契觸物貞亨迎瑞節於鳳銜榮兼四輔建碧幢於甌越永保千年凡於動植之間長受暄和之賜趙起居某今月二十日輒以所業賦一軸陳獻清嚴持腐草之造扶桑鞭欵段之觸騏驥所宜唾面敢俟回眸伏以起居為八韻之咸韶作九流之溟渤凡言進取須自品題而某二紀飄零三朝困辱若不仰投門館虔佇發揚則永攜疑玉以汍瀾長伴啞鐘而泯默攀託祈禱倍萬等倫崔右丞二首某獻賦命竒食貧計盡難安桂玉須逐萍蓬伏念灞滻行塵周秦去路平言南北猶悄神魂况今攀託門墻依憑奬顧以坑谷蒼黃之態戴丘山岌嶪之恩得不欲别還留將行復却丹誠聚血雙淚流珠矧當杏苑煙晴栁溝風暖陌上而羣英得意塵中而衰髮傷離設令勇若荆軻固亦慟如阮籍伏以右丞𢎞施陰德濬哲仁心儻或荑枯肉骨之未忘則膠柱刻舟而敢怠寧言今日唯愓將來遲回數仞之墻邊移時忍去愴恨九重之城外舉䇿何之感戀屏營罔知攸處又某依棲門館感激生成頻年忝極薦之書詞逾一鶚纍榜以未亨之數愧積遷鶯莫不愓息肺肝兢惶顔面既茲負纍合在棄嫌而又薦以羈遊仰干箋翰雖𢎞容之不改且循省以何安氷炭交懷芒刺在背今則已莊行計即擬出京不唯推戴嶽之誠指於皎日抑且切戀軒之志泣向清風攀感屏營罔知指喻韋舍人某近者輒持齋戒虔寓箋毫瀝南山待旦之誠告北陸移暄之律理雖可憫罪或難逃伏惟舍人義路無疆詞源絶岸設鑄顔之爐冶恢薦禰之箋函今則主文侵入院之期哲匠走致書之日儻蒙枉於公道申以私恩念某夙陷義圍薦臨文陳化鯤海闊乘風水以未知為鯉年深逼雲雷而愈懼特因薦士敢乞編名則獲從金籙以上聞焉有玉皇之不齒立辭坑谷繫在生成攀託禱祠涕淚沾迸工部陸侍郎某伏念聚蚊響於出震之音其惟懸越奔羽族於鳴岐之德乃不參差事既同途理宜瀝懇伏惟侍郎韞縑緗之奧學負詞賦之重名相如則逸格掞天孫綽則英聲擲地播於金石流入典謨竊以某架屋懷慙披沙莫喻固自循揣豈宜贄投但以水合朝宗雲須觸石繇是年齎鄙拙首扣門墻實為舉場之中貢士所業律詩古調詞賦歌篇前則貞元元和之風耳聞其事近則咸通乾符之事目覩其風求知已則咸禱於兼功斷否臧則須歸於本面然後人方必信道逮無疑則某一生辛勤數載攀祝必若題品不出於侍郎金口薦揚不出於侍郎瑶函縱能别契亨通固宜終慙暗昧矧以迷津未已泣刖方深比者先輩陳樵早同硯席曾將姓字虔為啓聞伏知侍郎猥賜奬容異於倫等其後薦自同志嘗聆玉音而侍郎文學蓍龜朝廷領袖某不敢以後來舉態近日時情僣瀆尊嚴躬陳一二今則久摧鬐鬛又近風波溝隍無必出之門肝鬲在須傾之地免叔向則他日莫議活士燮則神術所能願推恩於留馬埋蛇庶受賜於荑枯翼卵下情無任攀託依投激切愓懼之至翰林薛舍人某伏以十一日才除主文旋瀝情懇罪責則可言於躁切憫傷則宜恕於單危非不三省九思沈吟箋管而以途窮日暮恐懼風波亦猶抱沈疴者悉將虔告於神醫懷至痛者無不上呼於穹碧伏以學士舍人軒銅照膽蜀稱懸心仰惟燭臨當極幽奧且夫禮司取士寒進升名若無哲匠以斫成未有良時而自致不然者則安得權懸至鑒代有遺人伏惟學士舍人標表士林梯航陸海凡言進取須自門墻今以文柄有歸至公𢎞播則精力固同於造化嘉言乃作於蓍龜而某折角有年交鋒無託羽毛零落鬐鬛摧殘若不自學士舍人推恩極山嶽之隆攘臂到溝隍之底則還慙抱甕難出戴盆兼近者面獲起居親承念録哀某昔年五隨計吏刖雙足以全空今復三厯貢闈救陸沈而未暇許垂敏手拯上重霄謹以誓向鬼神刻於肌骨中興教化一身免沒於風塵下國兒孫百世敢忘於厮隸下情無任攀投懇悃之至裴侍郎某伏念薦孟明則子桑所能免叔向匪祁奚莫議推言及是瀝懇為宜上瀆清隆敢希容聽伏惟侍郎中丞頃持文柄大闡至公垂為聖代之凖繩懸作貢闈之日月某為後無私之兩榜遂乖必字於十年伏蒙侍郎中丞曲賜憫傷直加賞録連嵗薦論瑣質傾極重言而以弱植難培么絃易斷且驚負纍空費生成既而不罪龍鍾愈隆恩遇昨者面容跪履親俾窺天仍加琢玉之品題更啓如金之然諾便於此日上翥重霄今則已除主文只祈陰德延頸於溝隍之底瞻恩於丘嶽之隆雖龜龍不瑞於匹夫而犬馬合由於本主沾巾墮睫瀝膽披肝不在他門誓於死節下情無任攀託依投懇悃之至楊侍郎伏以羲爻不兆之文何人復演魯史不褒之事曠古誰稱厥理非遙斯言可喻伏以侍郎榮司文柄𢎞闡至公厯選滯遺精求文行泉下則大臣有感揭起銷沈場中則寒族無差酌平先後所以如某者曾干衡鏡經定否臧若不蒙指向後人説為遺恨則宰輔之為薦舉帝王之作知音而主且不言人誰肻信繇是須出侍郎金口須自侍郎瑶函今則論啓無私恩加瑣質錫生成於此日迥分付於將來早從握內以擠排便是眼前之科第然後念以漸臨風水莫如蓬島之音塵俾拜雲天親吐蘭言而誨諭留心及是自古所希莫不拳局循涯闌干抹泣質向神鬼誓於子孫鶯谷乘春雖託他門而振羽糜軀異日須歸舊地以論恩瀝肝膽以無窮寓箋毫而莫載下情無任感恩懇悃之至薛舍人今月二十八日張道古參軍仰傳仁恩伏承舍人學士不以某幽沈榮賜論薦初疑夢寐旋認生成不知所容兢惶戰悸伏以舍人學士半千膺數全碩負才嘉名冠絶於九流逸步翺翔於四户頃者重於知己避以文闈隆行望於聖賢蓄基負於台鼎竊惟薦士豈易其人而某蹤迹蹉跎藝能淺薄敢期𢎞造遽及茲辰金口開時講貫則處其異等瑶函發處推揚則置彼極言事出殊常榮非所望感深唯泣喜過翻驚不知微生何酬厚遇中興教化餘年獲出於溝隍下國兒孫纍世敢忘於厮隸趙員外伏以曦轡流輝已侵窮臘禹門飛浪即到登時莫不顒多士之精誠佇有司之新命竊惟萌朕已見升沈若某也折角有年爭鋒無主空秉龍鍾之態仰希傷憫之求此亦有類守株其疏若網伏惟員外學士猥隆恩遇克異等倫近者面獲起居親叨然諾自歸旅舍徹坐寒宵厯將往事以思惟洞見今辰之通塞且夫春官取士寒進升名若無哲匠之斫成未有良時而自致不然者則安得權懸至鑒代有遺人伏以某别無知音只投門館儻或員外學士止推言於公薦不攘臂於私恩則某也望絶飛馳甘為簸棄至若白雲巖谷青草汀州敢辭依舊秉耕踵前沈釣然以來時耆舊别後交親皆謂中興雪先朝之困辱寧期上國看後輩之飛鳴必疑有過於措持無聞於卿士既顔面而斯乏須蠻貊而云行是以瀝膽披肝碎身殞首永將死節不誓他門伏惟員外學士義路連天仁心匪石敢希援拯畢賜生成珠岸盤根始作不枯之草金丹入口能還已逝之魂祈禱依投啓喻罔盡下情無任攀託懇悃之至黃御史集卷七
