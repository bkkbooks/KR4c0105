body:
  text: 黄御史集巻二唐黄滔撰五言古詩送僧歸北巖寺北巖泉石清本自髙僧住新松五十年藤蘿成古樹題詩昔佳士滔表丈從叔有名於當時兼四門薛博士俱曾題詩清風二林喻上智失扣關多被浮名誤蓮扄壓月澗空美黄金布江飜島嶼沈木落樓臺露伊余東還際每起烟霞慕旋為儉府招未得窮野步西軒白雲閣師辭洞庭寓越城今送歸心到焚香處寓言流年五十前朝朝倚少年流年五十後日日侵皓首非通非介人誰論四十九賢哉蘧伯玉清風獨不朽長安書事終不離青山誰道雲無心卻是白雲士有時出中林昨日擎紫泥明日要黄金炎夏羣木死北海驚波深伏蒲無一言艸疏賀徳音賈客大舟有深利滄海無淺波利深波也深君意竟如何鯨鯢齒上路何如少經過寄友人君愛桃李花桃李花易飄妾憐松柏色松柏色難凋當年識君初指期非一朝今辰見君意日暮何蕭條入門有勢利孰能無囂囂落花落花辭髙樹最是愁人處一一旋成泥日暮有風雨不如沙上蓬根斷隨長風飄然與道俱無情任西東書懐寄友人此生如孤燈素心挑易盡不及如頑石非與磨礱近常思楊子雲五藏曾離身寂寞一生中千載空清芬閨怨妾家五嶺南君戍三城北鴈來雖有書衡陽越不得别乆情易料豈在窺翰墨塞上無烟花寧思妾顔色喜翁文堯員外病起衛玠羊車態長卿駟馬姿天嫌太端正神乃減風儀飲氷俾消渴斷穀皆清羸越僧誇艾炷秦女隔花枝自能論苦器語見泗州和尚碑不假求良醫驚殺漳濱鬼錯與劉生隨昨日已如虎今朝謁荀池揚鞭入王門四面人熈熈青桂任霜霰尺璧無瑕疵迴塵却惆悵歸闕難遲遲寄徐正字寅八月月如氷登樓見姑射美人隔千里相思無羽駕紅蘭裛露衰誰以流光訝何當詩一句同吟祝元化秋夕貧居聽歌桂席闌下馬槐烟裏豪門腐粱肉窮巷思糠粃孤燈照獨吟半壁秋花死遲明亦如晦雞唱徒為爾五言律詩送李山人徃湘中漢渚徃湘川乗流入逺天新秋無㟁水明月有琴船露坐應通暁萍居恐隔年岳峰千萬仭知上嘯猿巔書崔少府居文苑作贈李補闕魯史蜀琴旁陶然舉一觴夕陽明島嶼秋水淺池塘世亂憐官替家貧值嵗荒前峰上背宿知有辟寒方敷水盧校書九霄無詔下何事近清塵宅帶松蘿僻日唯猿鳥親吟髙仙掌月期有洞庭人莫問烟霞句懸知見嶽神寄漢上友人襄漢多清景東遊已不能蒹葭照流水風雨撲孤燈獻賦聞新鴈思山見去僧知君北來日惆悵亦難勝貽林鐸終被春闈屈低囘至白頭寄家僧許嶽釣浦雨移洲戰士曾憐善豪門不信愁王孫艸還綠何處擬羈遊書懐退耕逢歉嵗逐貢愧行朝道在愁雖淺吟勞鬢欲凋破村虹入井孤館客投魈誰怕秋風起聽蟬度渭橋送陳明府歸衡陽雛鶴兼留下單車出柳烟三年兩殊考一日數離筵乆别湖波綠相思嶽月圓翠蘿曾隱處定恐卻求仙秋辭江南灞陵橋上路難負一年期積雨鴻來夜重江客去時勞生多故疾漸老少新知惆悵都堂内無門雪滯遺入關旅次言懐寸心惟自切上國與誰期月晦時風雨秋深日别離便休終未肯已苦不能疑獨愧商山路千年四皓祠寄鄭縣李侍御古縣新烟火東西入客詩靜長如假日貧更甚閒時僧借松蘿住人將雨雪期三年一官罷嶽石㸔成碑上李補闕十洲非暫别龍尾肯慵登諫艸封山藥朝衣施衲僧月留江客待句厯釣船徵終恐林栖去餐霞葉上昇傷翁外甥江頭去時路歸客㡬紛紛獨在異鄉殁若為慈母聞青春成大夜新雨壊孤墳應作芝蘭出泉臺月桂分貽李山人野步愛江濱江僧得見頻新文無古集徃事有清塵松竹寒時雨池塘勝處春定應雲雨内陶謝是前身逢友人彼此若飄蓬二年何所從帝都秋未入江館夜相逢瘴嶺行衝夏邊沙住隔冬旅愁論未盡古寺扣晨鐘寄湘中鄭明府縣與白雲連滄洲况縣前嶽僧同夜坐江月㸔秋圓琴拂莎庭石茶擔乳洞泉莫躭雲水興疲俗待君痊寄從兄璞縱徵終不起相與避烟塵待到中興日同㸔上國春新詩説人盡舊宅落花頻移覔深山住啼猿作四鄰寄李校書遊簡寂觀古觀雲溪上孤懐永夜中梧桐四更雨山水一庭風詩得如何句仙遊最勝宫卻愁逢羽客相與入烟空寄友人山居斷嶠滄江上相思恨阻尋髙齋秋不掩㡬夜月當吟落石有泉滴盈庭無樹隂茫茫名利内何以拂塵襟上刑部盧員外誰識在官意開門樹色間尋幽頻宿寺乞假擬歸山半白侵吟鬢微紅見藥顔不知琴月夜文苑作今夜月㡬客得同閒送友人遊邊塞酒不能濃縱傾愁亦重關河初落日霜雪下窮冬野燒枯蓬旋沙風匹馬衝薊門無易過千里斷人蹤文苑作薊門雖漢土遊子莫從容和友人酬寄新發烟霞詠髙人得以傳吟銷松際雨冷咽石間泉大國兵戈日故鄉饑饉年相逢江海上寧免一澘然下第昨夜孤燈下闌干泣數行辭家從早嵗落第在初場青艸湖田改單車客路忙何人立功業新命到封王過商山燕鴈一來後人人盡到關如何衝臘雪獨自過商山羸馬髙坡下哀猿絶壁間此心無處説鬢向少年斑旅懐蕭颯聞風葉驚時不自堪宦名中夜切人事長年諳古畫僧留與新知客遇談鄉心隨去鴈一一到江南冬暮山舍喜標上人見訪寂寞三冬杪㴱居業盡抛逕松開雪後砌竹忽僧敲茗汲氷銷溜鑪燒鵲去巢共談慵僻意微日下林梢關中言懐三秦五嶺意不得不依然跡寓枯槐曲業蕪芳艸川花當落第眼雨暗出城天層閣浮雲外何人動管絃題友人山居到君棲跡所竹逕與衡門亦在乾坤内獨無塵俗喧新泉浮石蘚崩壁露松根更説尋僧處孤峰上嘯猿題友人山齋疎竹漏斜暉庭間隂復遺句成苔石茗吟弄雪忩碁沙艸泉經澀林齋客集遲西風虚見逼未擬問京師書事望嵗心空切耕夫盡把弓千家數人在一税十年空沒陣風沙黑燒城水陸紅飛章奏西蜀明詔與殊功題山居逸人十畆餘蘆葦新秋㸔雪霜世人誰到此塵念自應忘斜日風收釣㴱秋雨信梁不知雙闕下何以謂軒裳題鄭山人居履迹遍莓苔幽枝間藥栽枯杉擎雪朶破牖觸風開泉自孤峰落人從諸洞來終期宿清夜斟茗説天台秋晚山居爽氣遍搜空難堪倚望中孤烟愁落日髙木病西風山寂樵聲出露凉蟬思窮此時塵外事幽黙㡬人同遊山洞門穿瀑布塵世豈能通曾有遊山客來逢採藥翁異花尋復失幽逕躡還窮擬作經宵計風雷立滿空題王侍御宅内亭子俗間塵外境郭内宅中亭或有人家創還無蓮幕馨石曾湖㟁見琴誤嶽樓聽來客頻頻説終須作畫屏題道成上人院花宫城郭内師住亦清凉何必天台寺幽禪瀑布房簟舒湘竹滑茗煑蜀芽香更㸔道髙處君侯題翠梁貧居冬杪數塞未求通吾非學養蒙窮居嵗杪雨孤坐夜㴱風年長慙昭代才微辱至公還愁把春酒雙淚汚杯中東山之遊未遂漸逼行期作四十字奉寄翁文堯貟外軺車難乆駐須到别離時北闕定歸去東山空作期綠苔勞掃逕丹鳳欲銜詞楊柳開帆㟁今朝淚已垂貽張蠙同年夢思非一日攜手却凄涼詩見江南雹遊經塞北霜驅車先五漏把菊後重陽惆悵天邊桂誰教嵗嵗香寄邊上從事斜日下孤城長吟出㸃兵羽書和客巻邊思雜詩情朔雪定鴻翼西風嚴角聲公餘多獨坐沙月對樓生題東林寺元祐上人院廬阜東林寺良遊恥未曾半生隨計吏一日對禪僧泉逺攜茶看峰髙結伴登迷津出門是子細問三乗送陳樵下第東歸青山烹茗石滄海寄家船雖得重吟厯終難任意眠碪疎連寺栁風爽徹城泉類苑作蓮送目紅蕉外來期已杳然寄陳磻隱道經前輩許名拔後時喧虚左中興牓無先北海罇新文漢氏史别墅謝公村須到三徵處堂堂謁帝閽寄林寛相知四十年故國與長安俱喜今辰在休論徃嵗難海鳴秋日黑山直夏風寒終始前儒道昇沈盡一般退居老歸江上村孤寂欲何言世亂時人物家貧後子孫青山寒帶雨古木夜啼猿惆悵西川舉戎裝度劍門送友人邊遊銜杯國門外分手見殘陽何日還南越今朝徃北荒砂城經雨壊邉騎入秋狂親文苑作新詠關山月歸吟鬢的文苑作白霜下第出京還失禮官求花時出雍州一生為逺客㡬處未曾遊故疾江南雨單衣薊北秋茫茫數年事今日淚俱流遊東林寺平生愛山水下馬虎溪時已到終嫌晩重遊預作期寺寒三伏雨松偃數朝枝飜譯如曾見白蓮開舊池晩春關中忍厯通莊出東風舞酒旗百花無㸔處三月到殘時遊塞聞兵起還呉值嵗饑定唯荒寺裏坐與噪蟬期河梁五原人走馬昨夜到京師繡户新夫婦河梁生别離隴花開不艷𦍑笛靜猶悲惆悵良哉輔鏘鏘立鳳池送翁拾遺還家俄赴闕别思肻凄凄山坐軺車看詩將諫筆題天開中國大地設四維低拜舞吾君後青雲更有梯贈懐光上人謝城還擁入師以接人勞過午休齋慣離經吐論髙頂寒拳素髮珠鋭走紅絛終憶泉山寺聽猿看海濤憶廬山舊遊前年入廬嶽數宿在靈溪殘燭松堂掩孤峰月狖啼平生為客老勝境失雲棲縱有重遊日烟霞㑹恐迷别友人莫恨東牆下頻傷命不通苦心如有感他日自推公雨夜扁舟發花時别酒空越山烟翠在終媿卧雲翁陳侍御新居幕客開新第詞人遍有詩山憐九仙近石買太湖竒樹勢想髙日地形誇得時自然成避俗休與白雲期寄少常盧同年官拜少常休青緺換鹿裘狂歌離樂府醉夢到瀛洲古器岩畊得神方客謎畱清溪莫沈釣王者或畋遊寄敷水盧校書諫省垂清論仙曹豈乆臨雖専良史業未展直臣心路入丹霄近家蔵華岳深還如韓吏部誰不望知音贈明州霍員外惠化如施雨隣州亦可依正衙無吏近髙㑹覺人稀海日旗邊出河禽角外歸四明多隱客閑約到巖扉遊囊山山有重囊勢門開兩徑斜溪聲寒走澗海色月流沙庵外曾遊虎堂中舊雨花不知遺䜟地一一落誰家黄御史集巻二
