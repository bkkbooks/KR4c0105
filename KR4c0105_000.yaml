body:
  text: 黃御史集别集類一唐提要臣等謹按黃御史集十卷附録一卷唐黃滔撰滔字文江莆田人乾寧二年進士第光化中除四門博士尋遷監察御史裏行充威武軍節度推官王審知據有全閩而終守臣節滔匡正之力為多五代史稱審知好禮下士王淡楊沂徐寅唐時知多士多依之獨不及滔五代史多漏略不足據也又集中有祭南海南平王文稱崔員外昨持禮幣嘗詣門牆爰蒙執手之歡宏叙親仁之㫖云云乃為王審知祭劉隱而作按隱自大彭王進封南平王再進封南海王据五代㑹要南海之封在隱卒後一月故此文尚稱南平王說者或以髙季興亦稱南平又不知此文為代審知所作遂謂滔嘗應髙氏之聘亦考之未審矣唐書藝文志載滔集十五卷又泉山秀句三卷並已散佚此本卷首有楊萬里及謝諤序萬里序謂滔裔孫永豐君自言此集久逸其父考功公始得之僅四卷而已其後永豐君又得詩文五卷于吕夏卿家又得逸詩于翁承贊家又得銘碣于浮屠老子之宫編為十卷是淳熙初刻後再刻于明正德三刻于萬厯四刻于崇禎此本即崇禎刻也集中文頗贍蔚詩亦有貞元長慶之遺雖不及羅隱司空圖而實非徐寅諸人之所及其頴川陳先生集序稱天復元年甚叨閩相之辟考乾寧四年唐以福州為威武軍拜審知節度使纍遷同中書門下平章事封琅邢王至梁太祖即位乃封閩王仍同中書門下平章事滔稱閩相而不稱王則所謂規正審知使守臣節度是亦一證也末有附録一卷又載滔裔孫補遺文一篇補字季全紹興中進士厯官安溪縣令所著詩解九經解人物志等書皆失傳惟此篇僅存故附滔集以行云乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀黃御史集原序余在中都於官書及士大夫家見唐人詩集略及二百餘家自謂不貧矣逮歸耕南溪之上永豐明府莆陽黃君沃又遺余以其祖御史公文集其詩尤竒蓋余在中都時所未見也詩至唐而盛至晚唐而工蓋當時以此設科取士士皆爭竭其心思而為之故其工後無及焉時之所尚而患無其才者非也詩非文比也必詩人為之如攻玉者必得玉工焉使攻金之工代之琢則窳矣而或者挾其深博之學雄俊之文於是櫽括其偉辭以為詩五七其句讀而平上其音節夫豈非詩哉至於晚唐之詩則寱而誹之曰煆鍊之工不如流出之自然也誰敢違之乎余每見繪畫唐人李杜輩衣冠之竒古也偉之乃未既而笑之者至矣不笑不足以為古也古之可笑者獨衣冠哉御史公之詩如聞新雁一聲初觸夢半白已侵頭餘燈依古壁片月下滄洲如遊東林寺寒三伏雨松偃數朝枝如上李補闕諫草封山藥朝衣施衲僧如退居青山寒帶雨古术夜啼猿此與韓致光吳融輩竝游未知其何人徐行後長者也永豐君自言此集久逸其父考功公始得之僅數卷而已其後永豐君又得詩文五卷於吕夏卿之家又得逸詩於翁承贊之家又得銘碣於浮屠老子之宫當御史公之峕豈自知其詩文之傳不傳哉然二百年間幾乎泯矣而復傳於二百年之後然則士之所立顧其可傳與否耳其不傳也奚以戚其復傳也奚以欣余於是獨有得焉余見士大夫子孫承家百年而不毁者或寡矣而永豐君能力求其祖之詩文於二百年之前其可尚也夫而永豐之士有曽時傑與其猶子晞說者得此書又欣然刻印以供士君子之好古書者其又可尚也夫按唐藝文志御史諱滔字文江光化中為四門博士其集舊曰黃滔集云淳熙三年四月草六日誠齊野客廬陵楊萬里序詞章關乎氣運於唐尤驗云唐興三百年氣運升降其間而詩文因之自晉陽舉義開館宫西以延文學竟用詞賦取士士以操觚顯者無慮數百家大都始沿江左頽習競於絺繪耽披靡而乏氣骨伯玉奮然洗刷沈宋燕許輩出振響以至貞元長慶經術大明修古彌衆于時墨儒詞匠所為詩若文咸矩矱自然不以雕飾為工相與贊翊道真賡揚鴻化斯為鏘鏘爾雅故文盛於韓栁皇甫上係舊刻補闕而其衰也為孫樵為劉蛻為沈顔詩盛於李杜劉白而其衰也為鄭谷為羅隱為杜荀鶴御史生最晚而獨不然其文贍蔚有典則策扶教化其詩清淳丰潤若與人對語和氣郁郁有貞元長慶風槩祭陳林先輩諸文悲愴激越交情之深不以晝夜死生亂離契濶為問斷馬嵬館娃景陽水殿諸賦雄新雋永使人讀之廢卷太息如身生是時目攝其故為文若是其亦可貴已方登科時適昭宗之季年猶覆試殿廷再中選然後得官未幾而朱梁移國因歸閩不復西故不志合於世夫詎知八九葉之後得賢耳孫而平生作為文章遂獲表見者邵州將鋟板于郡齊遣信謁序御史之從兄曰校書君璞者名見集中有閩川名士傳及霧居子豫曩時嘗叙之矣故不辭而書御史諱滔字文江繇四門博士至裏行監察考功諱公度邵州名沃慶元二年十月十四日焕章閣學士宣奉大夫提舉隆興府玉隆萬夀宫魏郡公鄱陽洪邁序壁中之書孔聖所定漢有安國從而傳之得以明於萬古君子之於學是以重其世也河汾王氏有時變論五經録政大論政小論皇極議興衰論非文中之賢嗣著於首篇則四方恐未必知其名况書乎余嘗得眉山旌善院東坡大全兩集乃其孫蜀守仲虎與弟季文所較而刋者比之他處最為無誤今之所傳皆以此本為凖的然則世有其人固不同矣黃御史以文名於唐而纍葉蕃衍盛大于閩中至本朝紹興戊午有考功公大魁天下考功之子永豐縣公又能裒集御史詩文力加是正廣而傳之於是永豐二士曽時傑漢臣晞說少張因為鏤版繇此御史之書光芒于時可以無窮二㑹與余厚見委題序余感孔聖與河汾眉山之事而併書之庶幾儒家者流之子若孫留意先集乃有補風教之一端云淳熙四年九月朔渝川謝諤謹書
