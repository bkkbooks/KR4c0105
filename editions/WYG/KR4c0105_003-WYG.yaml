body:
  text: 黄御史集巻三唐黄滔撰七言律詩送林寛下第東歸為君惆悵惜離京年少無人有屈名積雪未開移發日鳴蟬初急説来程楚天去路過飛鴈灞㟁歸塵觸鎖城又得新詩幾章别烟村竹逕海濤聲商山贈隠者誰不相逢話息機九重城裏自依依蓬莱水淺有人説商洛山髙無客歸數隻珍禽寒月在千株古木熱時稀西牕昨夜鳴蛩盡知夢芝翁起扣扉送二友遊湘中千里楚江新雨晴同征肯恨迹如萍孤舟泊處聮詩句八月中旬宿洞庭為客早悲烟艸緑移家晩失岳峯青今来無計相從去歸日汀洲乞畫屏塞下疋馬蕭蕭去不前平蕪千里見窮邉闗山色死秋深日鼓角聲沈霜重天荒骨或銜殘鐵露驚風時掠暮沙旋隴頭寃氣無歸處化作隂雲飛杳然下第東歸留辭刑部鄭郎中諴去違知已住違親欲發羸蹄進退頻萬里家山歸養志數年門館受恩身鸎聲歴歴秦城暁栁色依依灞水春明日藍田闗外路連天風雨一行人寄懐南北故人秋風昨夜落芙蕖一片離心到外區南海浪髙書墮水北州城破客降胡玉牕挑鳯佳人老綺陌啼鸎碧樹枯嶺上青嵐隴頭月時通魂夢出来無闗中言懐事事朝朝委一罇自知無復解趨奔試期交後猶為客公道開時敢説寃窮巷住来經積雨故山歸去見荒村舉頭盡到斷腸處何必秋風江上猿閨怨寸心杳與馬蹄隨如蜕形容在錦帷江上月明船發後花間日暮信迴時五陵夜作酬恩計四塞秋為破敵期待到乗軺入門處淚珠流盡玉顔衰旅懐未喫金丹看十洲乃將身世作仇讐羇遊數地值兵亂宿在孤城聞雨秋東越雲山卻思隠西秦霜霰苦頻留它人折盡月中桂惆悵當年江上鷗别友人已喜相逢又怨嗟十年飄泊在京華大朝多事還停舉故國經荒未有家鳥帶夕陽投逺樹人衝臘雪往邉沙夢魂空繫瀟湘岸烟水茫茫蘆葦花寄羅浮山道者二首天際雙山壓海濆天漫絶頂海漫根時聞雷雨驚樵客長有龍蛇䕶洞門泉石暮含朱槿晝烟霞冬􅐬木緜温林間學道如容我今便辭它寵辱喧有人曽見洞中仙纔見人間便越年金鼎藥成龍入海玉函書發鶴歸天樓開石脈千尋直山折鼇鱗一半膻誰到月明朝禮處翠巖深鏁茘枝烟喜侯舍人蜀中新命三首八都詞客漫喧然誰解飛揚誥誓間五色綵毫裁鳯詔九重天子豁龍顔巴山月在趨朝去錦水烟生入閣還謀及中興多少事莫愁明月不収闗却搜文學起吾唐暫失都城亦未妨錦里幸為丹鳯闕幕賓徴出紫微郎来時走馬隨中使到日援毫定外方若以掌言看諫獵相如從此病輝光賈誼纔承宣室召左思唯預秘書流賦家達者無過此翰苑今朝是獨遊立被御罏烟氣逼吟經棧閣雨聲秋内人未識江淹筆竟問當時不早求經安州感故鄭郎中二首雲夢江頭見故城人間四十載垂名馬蹄踐處東風急雞舌銷時北闕驚岳客出来尋古劒野猿相聚叫孤塋騰身飛上鳯凰閣惆悵終乖吾黨情錦帳先生作牧州干戈缺後見荒丘兼無姓賈兒童在空有還珠烟水流江句行人吟刻石月腸是處象登樓旅魂頻此歸来否千載雲山屬一遊出京别崔學士一從門館遍投文旋忝恩知驟出羣不道鶴雞殊羽翼許依龍虎借風雲命竒未便乗東律言重終期雪北軍欲逐飄蓬向歧路數宵垂淚戀清芬旅懐雪貌潛彫雪髮生故園魂斷弟兼兄十年除夜在孤館萬里一身求大名空有新詩髙華岳巳無丹懇出秦城侯門莫問曽遊處槐栁隂中肝膽傾鴈楚岸花晴塞栁衰年年南北去来期江城日暮見飛處旅館月明聞過時萬里風霜休更恨滿川烟草且須疑洞庭雲水瀟湘雨好把寒更一一知新野道中野棠如雪艸如茵光武城邉一水濱越客歸遙春有雨杜鵑啼苦夜無人東堂嵗去銜盃懶南浦期来落淚頻莫道還家不惆悵蘇秦羈旅長卿貧寄越從事林嵩侍御子虚詞賦動君王誰不期君入對敡莫戀兔園留看雪已乗驄馬合凌霜路歸天上行方别道在人間乆更香應念都城舊吟客十年蹤跡委滄浪長安書事一年年課數千言口祝心祠挈出門孤進難時誰肯薦主司通處不須論頻秋入自邉城雪昨日聽来嶺樹猿若有水田過十畆早應歸去荻江村旅懐寄友人重疊愁腸只自知苦於吞蘗亂於絲一船風雨分襟處千里烟波迴首時故國田園經戰後窮荒日月逼秋期鳴蟬似㑹悠揚意陌上聲聲怨栁衰放榜日吾唐取士最堪誇仙榜標名出曙霞白馬嘶風三十轡朱門秉燭一千家郄詵聮臂昇天路宣聖飛章奏日華其年當日奏試嵗嵗人人来不得曲江烟水杏園花御試二首已表隋珠各自攜更從瓊殿立丹梯九華燈作三條燭萬乗君懸四首題靈鳯敢期飜雪羽洞簫應或諷金閨明朝莫惜場場醉青桂新香有紫泥六曹三省列簪裾丹詔宣来試士初不是玉皇疑羽客要敎金榜帶天書詞臣假寐題黄絹宫女敲銅奏子虚御目四篇酬九百敢從燈下畧躊躇二月二日宴中貽同年封先輩渭帝堯城裏日銜盃每倚嵇康到玉頽桂苑五更聽榜後蓬山二月看花開垂名入甲成龍去列姓如丁作鶴来同戴大恩何處報永言交道契陳雷酬俞鈞鄉書一忝薦延恩二紀三朝泣省門雖忝立名經聖鑒敢期興詠疊嘉言莫論蟾月無梯接大底龍津有浪飜今日朝廷推艸澤佇君承詔出雲根寄同年崔學士仁寳半因同醉杏花園塵忝鴻鑪與鑄顔已脱素衣酬素髮敢持青桂愛青山雖知珠樹懸天上終賴銀河接世間畢使海涯能拔宅三秦二十四畿寰寄陳侍御千年二相未全誇故劉相趙相曽從事閩中猶闕閩城賀降麻何必錦衣須太守别無蓮幕勝王家醴泉湧處休論水黄菊開時獨是花九級燕金滿罇酒却愁隨詔謁承華酬徐正字寅已免蹉跎負嵗華敢辭霜鬢雪呈花名從兩榜考昇第官自三台追起家疋馬有期歸輦轂故山無計戀桑麻莫言蓬閣從容乆披處終知金在沙辭府相時䝉堂帖追赴闕從漢至唐分五州誰為將相作諸侯閩江似鏡正堪戀秦客如蓬難乆留疋馬忍辭藩屏去小才寜副廟堂求今朝拜别幡幢下雙淚如珠滴不休寄羅郎中隠休向中興雪至寃錢塘江上看濤飜三徴不起時賢議九轉終成道者言緑酒千盃腸已爛新詩數首骨猶存瑤蟾若使知人事仙桂應遭蠧卻根江行遇王侍御數年分散秦吳隔暫泊官船浦栁中新草軍書名更重乆辭山逕業應空渡頭潮落將行客天際風髙未宿鴻此日相逢魂合斷賴君身事漸飛沖客舍秋晩夜懐故山寥寥深巷客中居况值窮秋百事疎孤枕憶山千里外破牕聞雨五更初經年荒艸侵幽逕幾樹西風鏁弊廬長繫寸心歸未得起挑殘燭獨躊躇絳州鄭尚書旌旗日日展東風雲稼連山雪刃空剖竹已知垂鳯食摘珠何必到龍宫諫垣虚位期飛步翰苑含毫待紀公誰謂唐城諸父老今時得見蜀文翁喜陳先輩及第嶠今年春已到京華天與吾曹雪怨嗟甲乙中時公道復朝廷看處主司誇飛離海浪從燒尾嚥卻金丹定易牙不是駕前偏落羽錦城爭得杏園花延福里居和林寛何紹餘醻寄長説愁吟逆旅中一庭深雪一牕風眼前道路無心覔象外烟霞有句通幾度相留侵鼓散頻聞㑹宿著僧同髙情未以干時廢屬和因知興不窮贈宿松楊明府溪上家家禮樂新始知為政異常倫若非是水清無底爭得如氷凜拂人月狖聲和琴調咽烟村景接栁條春宦遊兼得逍遙趣休憶三吳舊釣津送僧纔年七嵗便從師猶説辭家學佛遲新斸松蘿還不住愛尋雲水擬何之孤溪雪滿維舟夜疊嶂猿啼過寺時鳥道龍湫悉行後豈將飜譯負心期贈鄭明府庭羅衙吏眼看山真恐風流是謫仙垂栁五株春婭姹鳴琴一弄水潺湲援毫斷獄登殊考駐樂題詩得出聮莫起陶潛折腰歎才髙位下始稱賢江州夜宴獻陳員外多少歡娛簇眼前潯陽江上夜開筵數枝紅蠟啼香淚兩面青娥折瑞蓮清管徹時斟玉醑碧籌回處擲金船因知徃嵗樓中月占得風流是偶然湘中贈張逸人羽衣零落帽欹斜不自孤峯即海沙曽為蜀山成寓跡又因湘水擬營家鳴琴坐見燕鴻没曳履吟忘野逕賖更愛扁舟宿寒夜獨聽風雨過蘆花寓題紛紛墨勅除官日處處紅旗打賊時竿底得璜猶未用夢中吞鳥擬何為損生莫若攀丹桂免俗無過詠紫芝兩岸蘆花一江水依前且把釣魚絲題陳山人居猶自莓苔馬跡重石嵌泉冷嬾移峰空垂鳯食簷前竹漫拔龍形澗底松隔岸青山秋見寺半牀明月夜聞鐘誰能惆悵磻溪事今古悠悠不再逢宿李少府園林一壺濁酒百家詩住此園林守選期深院月涼留夜客古杉風細似泉時嘗頻異茗塵心淨議罷名山竹影移明日緑苔渾掃後石庭吟坐復容誰送人明經及第東歸十問乆通離義牀今時登第信非常亦從南院看新榜旋束春闗歸故鄉水到吳門方見海樹侵閩嶺漸無霜知君已塞平生願日與交親醉幾場斷酒未老先為百病仍醉盃無計接賓朋免遭拽盞郎君謼類苑作謔還被簪花録事憎絲管合時思索馬池塘晴後獨留僧何因澆得離腸爛南浦東門恨不勝寄蔣先輩在蘇州夫差宫苑悉蒼苔攜客朝遊夜未回塚上題詩蘇小見許殿切江頭酹酒伍員来秋風急處烟花落明月中時水寺開千載三吳有髙跡虎丘山翠益崔嵬南海幕和段先輩送韋侍御赴闕樹色川光入暮秋使車西發不勝愁璧連標格驚分散雪課篇章互唱醻魏闕别當飛羽翼燕臺獨且占風流滿園歌管涼宵月此後相思幾上樓寄南海黄尚書五羊城下駐行車此事如今八載餘燕頷已知飛食肉龍門猶自退為魚紅樓入夜笙歌合白社驚秋草木疎西望清光寄消息萬重烟水一封書送人徃蘇州覲其兄闔閭城外越江頭兩地烟濤一葉舟到日荆枝應便茂别時珠淚不須流迎歡酒醒山當枕詠古詩成月在樓明日樽前若相問為言今訪赤松遊遊東林寺長生猶自重無生言讓仙祠佛寺成碑折誰忘康樂制山靈表得逺公名松形入漢藤蘿短僧語離經耳目清莫恠遲遲不歸去童年已夢遶林行贈旌徳吕明府渥洼步數太阿姿爭遣王侯不奉知花作城池入官處錦隨刀尺少年時兩衙斷獄兼留客三考論功合樹碑須信隔簾看刺史錦章朱紱已葳蕤賀清源僕射新命雖言嵩嶽秀崔嵬少降連枝命世才南史兩榮唯百揆東閩雙拜有三台南史袁憲兄弟同為僕射當時榮之殊未若今清源與府城並拜僕射兼帶台席之尊二天在頂家家詠丹鳯銜書嵗嵗来虚説古賢龍虎盛誰攀荆樹上金臺浙幕李端公泛建溪越城吳國結良姻交發芙蓉幕内賓自顧幽沈槐省跡得陪清顯諫垣臣分題暁並蘭舟逺對坐宵聽月狖頻更愛延平津上過一雙神劒是龍鱗貽宋評事河陽城裏謝城中入曳長裾出佩銅燕國金臺無别客陶家栁下有清風數蹤篆隸書新得一竈屯䝉火細紅時説三吳欲歸處緑波洲渚紫蒲藂催粧北府迎塵南郡来莫將芳意更遲回雖言天上光隂别且被人間更漏催烟樹迥垂連蒂杏綵童交捧合歡杯吹簫不是神仙曲爭引秦娥下鳯臺寓題每憶家山即涕零定須歸老舊雲扄銀河水到人間濁丹桂枝垂月裏馨霜雪不飛無翠竹鯨鯢猶在有青萍三千九萬平生事却恨南華説北溟傷蔣校書徳山誰到雙溪溪岸傍與招魂魄上蒼蒼世間無樹勝青桂隴上有花唯白楊秦苑火燃新賦在越城山秀故居荒如何萬古雕龍手獨是相如識漢皇寄楊贊圖學士學士與元昆俱以龍腦登選東堂第一領春風時恠闗西小驥慵華表柱頭還有鶴華歆名下别無龍君恩鳯閣含毫數詩景珠宫列肆供今日江南駐舟處莫言歸計為雲峰醻楊學士神仙簿上愧非夫詔作疑丹兩入爐詩裏幾曽吟芍藥花中方得見菖蒲陽春唱後應無曲明月圓来别是珠莫下蓬山不迴首東風猶待重摶扶寄同年李侍郎龜正石門南面淚浪浪自此東西失帝鄉崐璞要疑方卓絶大鵬須息始開張已歸天上趨雙闕忽喜人間捧八行莫道秋霜不滋物菊花還借後時黄鍾陵故人滕王閣下昔相逢此地今難訪所從唯愛金籠貯鸚鵡誰論鐵柱鏁蛟龍荆榛翠是錢神染河嶽期須國士鍾一筯鱸魚千古美後人終少繼前蹤故山支頥黙省舊林泉石徑茅堂到目前衰碧鳴蛩莎有露濃隂歇鹿竹無烟水從井底通滄海山在牕中倚逺天何事蒼髯不歸去燕昭臺上一年年塞上塞門闗外日光微角怨單于鴈駐飛衝水路從冰解斷踰城人到月明歸燕山臘雪銷金甲秦苑秋風脆錦衣欲弔昭君倍惆悵漢家甥舅竟相違烏石村即林希劉故居徃日江村今物華一迴登覽一悲嗟故人殁後城頭月新鳥啼来隴上花賣劒錢銷知絶俗聞蟬詩苦即思家謝公古郡青山在三尺孤墳撲海沙寄同年盧員外聽盡鸎聲出雍州秦吳烟月十經秋龍門在地從人上郎省連天須鶴遊休戀一臺惟妙絶已經三字入精求當年甲乙皆華顯應念槐宫今雪頭寄同年封舍人渭時得来書唐城接軫赴秦川憂合懽離驟十年龍頷摘珠同泳海鳯銜輝翰别昇天八行真跡雖収拾四户高扄奈隔懸能使丘門終始雪莫敎華髮獨潸然遇羅員外衮灞陵橋外駐征轅此一分飛十六年豸角戴時垂素髮雞香含處隔青天綺園難貯林棲意班馬須持筆削權可忘自初相識地秋風明月客鄜延送翁員外承贊誰言吾黨命多竒榮美如君歴數稀衣錦還鄉翻是客迴車謁帝卻為歸鳯旋北闕虚丹穴星復南宫逼紫微已分十旬無急詔天涯相送只沾衣翁文堯員外捧金紫還鄉之命雅發篇章將原交情逺為嘉貺洎燕鴻陸犬楚水荆山又吐瓊瑤逮之幽鄙雖湧泉思觸逸興皆虚而强韻押難非才頗愧輒兹酬和以質奬私搏將盛事更無餘還向橋邉看舊書東越獨推生竹箭北溟喜足貯鯤魚兩迴誰解歸華表午夜兼能薦子虚滔前年䝉文堯員外以長牋薦於時相須把頭冠彈盡日憐君不與故人疎奉和翁文堯員外經過七林書堂見寄之什朱旗引入昔茒堂半日從容盡日忙駟馬寳車行賜禮金章紫綬帶天香山從南國添烟翠龍起東溟認夜光定恐故園留不住竹風松韻漫凄鏘奉酬翁文堯員外駐南臺見寄之什人指南臺山與川大驚喜氣異當年花迎金册非時折月對瓊杯此夜圓我愛藏冰從夏結君憐脩竹到冬鮮殷勤更抱鳴琴撫為憶秦兒識斷絃翁文堯員外擁册禮之歸一路有詩名晝錦集先將寄示因書五十六字六窠只佩諸侯印爭比從天擁冊歸一軸郢人歌處雪兩重朱氏著来衣閩山秀已鍾君盡洛水波應濺我稀明日陪塵迎駟馬定須齋沐看光輝奉和翁文堯十九員外中謝日䝉恩賜金紫之什面䝉君賜自龍墀誰是還鄉一襲衣三品易懸鱗鬛赫八絲展起綵章飛夐為勝事垂千古題作新詩啟七微嚴助買臣精魄在定應羞著昔年歸奉和翁文堯員外文秀光賢晝錦三首鄉名里號一朝新乃覺台恩重萬鈞建水閩山無故事長卿嚴助是前身清泉引入旁添潤嘉樹移来别帶春莫凭欄干剰留駐内庭虚位待才臣右文秀亭雖言閩越繫生賢誰是還家寵自天山簡媿兼諸郡命鄭𤣥慙秉六經權鳥行去没孤烟樹漁唱還從碧島川休説遲迴未能去夜来新夢禁中泉右光賢閣君王面賜紫還鄉金紫中推是甲裳華構便將垂美號故山重更發清光水澄此日蘭宫鏡樹憶當年柏署霜珍重朱欄兼翠栱来来皆自讀書堂右晝錦堂奉酬翁文堯員外神泉之遊見寄嘉什含雞假豸喜同遊野外嘶風並紫騮松竹迥尋青嶂寺姓名題向白雲樓泉源出石清消暑僧語離經玅破愁爭奈愛山尤戀闕古来能有幾人休寄翁文堯拾遺唐設髙科表用文吾曹誰作諫垣臣甌山秀氣曠千古鳯闕華恩鍾二人起草便論天上事如君不是世間身龍頭鳯尾前年夢今日須憐應若神滔夘年冬在宛陵夢文堯作狀頭及第又申四月十二夜在清源夢到殿前東道自西厲聲唱翁某拜右省拾遺黄御史集巻三
