body:
  text: 黄御史集巻四唐黄滔撰五言排律省試一一吹竽乾符二年齊竽今厯試真偽不難知欲使聲聲别須令箇箇吹後先無錯雜能否立參差次第敎單進宫商乃異宜凢音皆竄跡至藝始呈竒以此論文學終憑一一窺明月照髙樓月滿長空朗樓侵碧落横波文流藻井桂魄拂雕楹深鑒羅紈薄寒捜户牖清氷鋪梁燕噤霜覆瓦松傾卓午收全影斜懸轉半明佳人當此夕多少别離情廣州試越䑓懷古南越千年事興懷一見來歌鐘非舊俗烟月有層䑓北望人何在東流水不回吹牕風雜瘴沾檻雨經梅壯氣曾難揖空名信可哀不堪登覽處花落與花開襄州試白雲歸帝鄉杳杳復霏霏應縁有所依不言天路逺終望帝鄉歸髙嶽和霜過遥闗帶月飛漸憐雙闕近寜恨衆山違陣觸銀河亂光連粉署微旅人隨計日自笑比麻衣省試奉詔春漲曲江池以春字為韻乾符二年池脉寒來淺恩波注後新引將諸派水别貯大都春幽咽疏通處清泠迸入辰漸平連杏岸旋濶映梅津沙没迷行徑洲寛恣躍鱗願當舟檝便一附濟川人題宣一僧正院五級凌虚塔三生落髪師都僧須有託孤嶠遂無期井邑焚香待君侯减俸資山衣隨疊破菜骨逐年羸茶取寒泉試松於逺澗移吾曹來頂手不合不題詩和王舎人崔補闕題福州天王寺郭内青山寺難論此崛竒白雲生院落流水下城池石像雷霆啟江沙鼎鼐期嶽僧來坐夏秦客㑹題詩岡轉泉根滑門昇蘚級危紫微今日句黄絹㫺年碑歇鶴松低閣鳴蛩徑出籬粉垣千堵束金塔九層支啼鳥笙簧韻開花錦繡姿清齋奔井邑𤣥髪剃熊羆極浦征㠶小平蕪落日遲風篁清却暑烟草緑無時信士三公作靈蹤四絶推良遊如不宿明月擬何之寄獻梓橦山侯侍郎時常拾遺諫諍漢宫行廟略簪笏落民文苑作人間直道三湘水髙情四皓山賜衣僧脱去奏表主批還地得松蘿塢泉通雨雪灣東門添故事南省缺新班有新命不起片石秋從露幽牕夜不闗夢餘蟾隱映吟次鳥綿蠻可惜相如作當時事悉閒壬癸歳書情故園招隱客應復笑無成謁帝逢移國投文値用兵孤松憐鶴在疎柳惡蟬鳴匹馬迷歸處青雲失曩情江頭寒夜宿壠上歉年耕冠葢新人物漁樵舊弟兄易生唯白髪難立是浮名惆悵㶚橋路秋風誰入行河南府試秋夕聞新鴈湘南飛去日薊北乍類苑作又驚秋呌出隴雲夜聞為客子愁一聲初觸夢半白已侵頭旅舘移欹枕江城起倚樓餘燈依古壁片月下滄洲寂聽良宵徹躊躇感歳流和吳學士對春雪獻韋令公次韻春雪下盈空飜疑臘未窮連天寧認月堕地屢兼風忽誤邊沙上應平火嶺中林間妨走獸雲際落飛鴻梁苑還吟客齊都省創宫掩扉皆墐北移律媿居東書幌飄全濕茶鐺入旋融奔川半留滯疊樹互玲瓏出户行瑶砌開園見粉藂高才興詠處眞宰答殊功省試内出白鹿宣示百官乾寧二年上瑞何曾乏毛羣表色難推於五靈少宣示百寮觀形奪場駒㓗光交月兎寒巳馴瑶草别孤立雪花團戴豸慙端士抽毫躍史官貴臣歌詠日皆作白麟㸔出關言懷又乞書題出闗西謁列侯寄家僧許嶽釣浦雨移洲賣馬登長陸沾衣逐勝遊菜腸終日餒霜鬂度年秋詩苦無人愛言公是世仇却憐庭際草中有號忘憂塞上掘地破重城燒山搜伏兵金徽互嗚咽玉笛自凄清使發西都聳塵空北嶽横長河渉有路曠野宿無程沙雨黄鶯囀轅門青草生馬歸秦苑牧人在塞雲耕落日牛羊聚秋風鼔角鳴如何漢天子青塜杳含情壺公山古老相傳古仙姓陳名壺公於此山成道因而名焉八靣峰巒秀孤髙可偶然數人逰頂上滄海見東邊不信無靈洞相傳有古仙橘如珠夏在池象月垂穿山頭有池而圓兼橘樹朱實夏在髣髴嘗聞樂岧嶤半挿天山寒徹三伏松偃岀千年樵牧時迷所倉箱歳疊川嚴祠風雨管怪木薜蘿纒青草方巾藥蒼苔石裡錢瓊津流乳竇春色駐芝田烏兔中時近龍蛇蟄處膻嘉名光列土秀氣産群賢瀑鏁瑶臺路溪昇釣浦船鼇頭擎恐沒地軸壓應旋蠲疾寒甘露藏珍起瑞烟畫工飛夢寐詩客寄林泉掘地多雲母縁霜欠木綿井通鰌吐脉僧隔虎棲禪山間有井通海盈縮之候貞元中有僧號法通咸通中有僧號𢎞播於其絶頂獨禪昏行至降虎而法通曾下山遇兩虎爭一牛乃叱而隔之分令各啖之危磴千尋拔竒花四季鮮鶴歸𤣥圃少鳳下碧梧偏桃易炎凉熟茶推醉醒煎村家蒙棗栗俗骨爽猿蟬谷語昇喬鳥陂開其蒂蓮落楓丹葉舞新蕨紫芽拳翠竹雕羌笛懸藤煑蜀牋白雲長掩映流水别潺湲作賦前儒闕沖虚南國先省郎求牧㸔野老葺齋眠潘郎中存實詩云雙旌牧清源吟看壺公翠又歐陽秬先輩自刺史蘇君書求泉山之為畫屏云壺公之髙洛陽之湥夢魂所思寺厯興衰創碑須一二鐫清吟思却隱簪紱奈縈牽七言排律投翰長趙侍郎禹門西面逐飄蓬忽喜仙都得入蹤賈氏許頻趨季虎荀家因敢謁頭龍手扶日月重輪起數是乾坤正氣鍾五色筆驅神岀没八花塼接帝從容詩酬御製風騷古論自人情鼎鼐濃豈有地能先鳯掖别無山㪅勝鼇峰攀鴻日淺魂飛越為鯉年湥勢噞喁澤國雨荒三逕草秦闗雪折一枝笻吹成暖景猶葭律引上纎蘿在嶽松願向明朝薦幽滯免敎號泣觸登庸鄜畤李相公秦城擇日發征轅齋戒來投節制尊分虎名髙初命相攀龍迹下愧登門夜聴謳詠銷塵夢曉拜旌幢戰旅魂華舍天開寧有礙綵毫雖疑作錐乏敢無言生兼文武為人傑岀應乾坤靜帝閽計吐六竒誰敢敵學窮三略不須論功髙馬卸黄金甲臺迥賔懽白玉罇九穗嘉禾垂綺陌四時甘雨帶雕軒推恩毎覺東溟淺吹律能令北陸暄青草連沙無血濺黄榆鏁塞有鸎飜笙歌合沓春風郭雞犬連延碧岫村遊子不縁貪獻賦永依棠樹託蓬根投刑部裴郎中兩牓驅牽别海涔它門不合覔知音瞻恩雖隔雲雷賜向主終知犬馬心詩禮後人窺作鏡廟堂前席待為霖已齊日月懸千古肻誤風塵使陸沈拜首敢將誠吐血蜕形唯待諾如金愁聞南院看期到恐被東牆舊恨侵緇化衣空難扺雪黒銷頭盡不勝簪數行淚裡依投志直比滄溟未是湥成名後呈同年業詩攻賦薦鄉書二紀如鴻厯九衢待得至公捜草澤如從平陸到蓬壺雖慙錦鯉成穿額忝獲驪龍不寐珠蒙楚數疑休下泣師劉大喝已為盧人間灰管供紅杏天上烟花應白榆一字連鑣廵甲族千般唱罰賞皇都名推顔柳題金塔飲自燕秦索玉姝退媿單寒終預此敢將恩嶽怠斯須五言絶句輦下寓題對酒何曾醉尋僧未覺閒無人不惆悵終日見南山寄題崔校書郊舍一片寒塘水尋常立鷺鷥主人貧愛客沽酒往吟詩秋思碧嶂猿啼夜新秋雨霽天誰人愛明月露坐洞庭船芳草澤國多芳草年年長自春應從屈平後㪅苦不歸人輦下書事北闕新王業東城入羽書秋風滿林起誰道有鱸魚七言絶句入闗言懷背將蹤跡向京師岀在先春入後時落日㶚橋飛雪裡已聞南院有㸔期過長江曾搜景象恐通神地下還應有主人若把長江比湘浦離騷不合自靈均題靈峰僧院繫馬松間不忍歸數廵香茗一枰棋擬登絶頂留人宿猶待滄溟月滿時司馬長卿一自梁園失意回無人知有掞天才漢宫不鏁陳皇后誰肻量金買賦來和同年趙先軰觀文玉兎輪中方是樹金鼇頂上别無山雖然迴首見烟水事主酬恩難便閒岀京别同年一枝仙桂已攀援歸去烟濤浦口村雖恨别離還有意槐花黄日出青門歸思薊北風烟空漢月湘南雲水半蠻邊寒為旅鴈暖還去秦越離家可十年東林寺貫休上人篆𨽻題詩師名自越徹秦中秦越難尋師所從墨跡兩般詩一首香爐峰下似相逢寓江州李使君使君曾被蟬聲苦毎見詞文即為愁况是楚江鴻到後可堪西望發孤舟遊南寓題江山節被雪霜遺毒草過秋未擬衰天不當時命鄒衍亦將寒律入南吹九日陽數重時隂數殘露濃風硬欲成寒莫言黄菊花開晚獨占樽前一日歡夏州道中隴鴈南飛河水流秦城千里忍囘頭征行渾與求名背九月中旬往夏州經慈州感謝郎中金聲乃是古詩流况有池塘春草儔莫遣宣城獨垂號雲山彼此謝公遊寓題吴中烟水越中山莫把漁樵漫自寛歸泛扁舟可容易五湖髙士是抛官寄宋明府北闕秋期南國身重闗烟月五溪雲風蟬已有數聲急賴在陶家柳下聞花莫道顔色如渥丹莫道馨香過茞蘭東風吹綻還吹落明日誰為今日看閏八月無人不愛今年閏月㸔中秋兩度圓唯恐雨師風伯意至時還奪上樓天别後夣裏相逢無後期烟中解珮杳何之虧蟾便是陳宮鏡莫吐清光照别離嚴陵釣臺終向烟霞作野夫一竿竹不換簪裾直鈎猶逐熊羆起獨是先生眞釣魚馬嵬三首鐡馬嘶風一渡河淚珠零便作驚波鳴泉亦感上皇意流下隴頭嗚咽多龍腦移香鳳輦留可能千古永悠悠夜䑓若使香魂在應作烟花岀隴頭錦江晴碧劍鋒竒合有千年降聖時天意從來知幸蜀不闗胎禍自蛾眉奉和文堯對庭前千葉石榴一朶千英綻曉枝綵霞堪與别為期移根若住芙蓉苑豈向當年有醒時翁文堯以美疹暫滯令公大王益得異禮觀今日寵待之盛輙成一章滋賦諴文侯李盛終求一襲錦衣難如何兩度還州里兼借鄉人更剰觀林鄭在舉塲日時曰滋賦諴文中外相奨木芙蓉三首黄鳥啼烟二月朝若教開即牡丹饒天嫌青帝恩光盛留與秋風破寂寥郤假青腰女剪成緑羅囊綻綵霞呈誰憐不及黄花菊只遇陶潛便得名須到露寒方有態為經霜裛稍無香移根若在秦宫裏多少佳人泣曉籹奉和翁文堯戲寄握蘭宫裏數名郎好是乘軺出帝鄉兩度還家還未有别論光彩向冠裳和陳先輩陪陸舍人春日逰曲江劉超遊召郄詵陪為憶池亭舊賞來紅杏花旁見山色詩成因觸鼓聲回靈均莫問靈均昔日逰江籬春盡岸楓秋至今此事何人雪月照楚山湘水流巻簾緑鬟侍女手纖纖新捧嫦娥岀素蟾衛玠官髙難乆立莫辭雙巻水精簾啟帳得人憎是繡芙蓉愛鎻嫦娥岀月蹤侍女莫嫌擡素手撥開珠翠待相逄去扇城上風生蠟炬寒錦帷開處露翔鸞已知秦女昇仙態休把圓輕隔牡丹附來贈詩賀黃文江覆試及第禇載一枝芳桂兩迴春始騐文章可致身巳把色絲邀上第又將鴻筆冠群倫龍泉再淬方知利火浣重燒轉覺新今日街一作仰頭㸔御牓大能榮耀苦心人和從兄御史延福里居從弟蟾天賜平安水北中滿庭荆樹醉春風縱敎塵世三公貴何似吾家一脈通花底輕風香撲散門前細柳緑皆同回頭文館長安上謂徳温兄此際思子寧有窮黄御史集巻四右族祖御史文江公詩裔孫希英之所刻者攷之唐藝文志黄某集十五巻而家藏舊刻本無巻目止分詩賦啓祭文碑銘為五類盖散逸者亦多矣今詩凢二百五篇予以意僣分為四巻即楊誠齋先生為序稱其詩尤竒者夫以詩之竒如此而僅存者又如此顧世之莫傳焉豈非嗣續子孫責哉又是集中有寄從兄璞者是為校書徳温公其所著有閩川名士傳及霧居子集今皆散落不傳希英其為我訪之東南藏書家倘有獲焉尚當與御史公全書並梓以行可也庸書以俟正徳八年癸酉秋日賜進士第承徳郎兵部武庫司主事諸孫鞏敬書黄御史集巻四
