body:
  text: 黃御史集卷五唐黃滔撰碑記銘泉州開元寺佛殿碑記混沌死而天地生道德銷而仁義作情車業網始脈旋波天謂洛龜河龍文有生而不文無生乃産金聖人於西國鑽智慧火乾煩惱海理不吾吾而一貫生生其姿電霩於周室其波𣲖漾於漢代繇是館移鴻臚城崇白馬斯有寺之始也寺制殿象王者之居尊其法也其後金地蓮扄周旋四海烏飛兔走或故或新至如神運之靈莫靈矣亦靡得而巋然則我州開元寺佛殿之與經樓鐘樓一夕飛燼斯革故鼎新之數也初僕射太原公以子房之帷幄布泉城以叔度之袴襦纊泉民而謂竺乾之道與尼聃鼎宜根乎信而友乎理矧開元闕宇五十載之聖容實寺之冠洎帥閩也愈進其誠繕經三千卷皆極越藤之精書工之妙駕以白馬十乘送以府僧迎以郡僧置之兹樓既而秦灰等烈蜀雨不飛識者以為物之尤罕留於世敬之至必動乎神是必為地祇所搜龍宮之索不然者曷與斯故新之數期厥理則明我宜悄然不已仲弟檢校工部尚書為兹郡之秋也武則拍孫吳之背文則席夏商於前而復龍虎之內以塤以篪大聳孟龍之旨乃割俸三千緡鳩工度木煙巖雲谷之把梓楩楠投刃以時趨功以隟食以月粟付以心倕不期年而寶殿湧出棟隆舊綺梁修新虹八表四隅悉半乎丈柱盛鏡礎方圭叢斗楣承蟠螭飛雲翼栱文榱刻桷轇轕杈丫或經緯以开織或丹雘而纈耀皛若蟾窟嶪如鼇背風夏觸而秋生僧朝梵而谷應升者骨冰觀者目波而五間兩厦昔之制也自東迦葉佛釋迦牟尼佛左右真容次彌勒佛彌陀佛阿難迦葉菩薩衛神雖法程之有常而相貌之欲動東北隅則揭鐘樓其鐘也新鑄仍偉舊規西北隅則揭經樓雙立嶽峰兩危蜃雲東瞰全城西吞半郭霜韻扣而江山四爽金字駢而講誦千來是知天地日月鬼神不欲一存其物將有待於後人也設使斯殿也斯樓也不有之故其何以新我公之作之為其何以布之哉三略六韜流通貝多戈霜劍雪為甘露潔信英智之所措也既畢召化內之緇錫數邁於千齋而落之纍中慈雲五色慧日重輪談者以為梵天之宇化於是矣靈山之會儼於是矣我公之倅試大理評事宋君曰駢才推博古識洞真如請立貞珉垂於不朽公以小儒不佞俾刻斯文僧正臨壇大德僧宣一桑門之關楗者曰寺有記亡之矣垂拱二年郡儒黃守恭宅桑樹吐白蓮花捨為蓮花道場後三年升為興教寺復為龍興寺逮元宗之流聖儀也卜勝無以甲兹遂為開元寺焉嘗有紫雲覆寺至地至今凡草不生其庭大矣哉自垂拱之迄開元四朝而四易號及句諒兆水於木垂雲剃草謂桑蓮之與雲草天啓地靈之如是則開元實寺之冠斯又冠開元焉金聖人無為也堯舜亦無為也誠參錯其道巍巍聖儀永與諸佛如來俱豈不其然愚是以奮筆於一公之説乾寧四年丁巳冬十一月日記大唐福州報恩定光多寶塔碑記金聖人之教功與德魯聖人之教忠與孝以忠孝之祈功德莫之大也天復元年辛酉天子西巡岐汴交兵京洛顒顒我威武軍節度使相府琅琊王王公祝天地鬼神以至忠之誠發大誓願於開元之寺造塔建號壽山仍輔以經藏乞車駕之還宮也其三年甲子以大孝之誠發大誓願於兹九仙山造塔建號定光仍輔以經藏為先君司空先秦國太夫人元昆故司空薦祉於幽隂也大矣哉赫赫忠誠懇懇孝思以國以家以明以幽胡天地之不動與胡鬼神之不感與釋之西天謂之窣堵波中華謂之塔塔制以層增其敬也造之獲無量無邉功德初我公以宏才妙略之有藩維以仁智神鑒之謀遠大謂閩越之江山奇秀土風深厚而府城坐龍之腹烏石九仙二山聳龍之角屹屹巖巖孱孱顏顏兩排地面雙立空際怪石如墉回岡若揖東銜滄海以鏡豁西走建溪而帶縈氣色蒙茸風雲蓬勃非仙宮佛寺不可以乘龍之角大龍之腹何烏石二而九仙曠烏石山有神光天王二寺豈非代虛其作地祕其期以待我公况古仙鍊骨之所升真之迹邪一旦之新城月圓壬戌歲我公卜築其外城號月城二山之嘉氣雲連森上介掀大斾或旬或朔眷於粉堞之上時行時止卜於煙巒之堀得峻中之平平中之峻凸而不隆凹而不卑樹翳薈以奇姿草芊􅀢而別翠遂從宏願啓兹塔之基焉塔之科也恐山之偏憂地之入將塹平壤五十尺之深百有餘尺之濶杵土積石而上上聲逮二十尺瞥然虹見瑩然穴貯俄以珠寶之獲坐以金錢大不及拳光能奪目於時清風四來海天擴開煙霞蓊蔚於城隅鸞鶴盤旋於林表舉閩之軍傾閩之俗以趨以走以歌以詠既而畚鍤投般倕奮內甃以磚凡四十萬口外搆以木蓋百其巧七層八面玲瓏􅌄窱榱桷欄楯轇轕杈丫雲楣翼環圭斗鱗蹙雕鎪丹雘曲盡其妙方七十有七尺高二百尺相輪之四十尺參之也懸輪之鐸一百九十懸層之鐸五十有六角瓦之神五十有六其內也則門門面面繢以金像不可勝紀登之者若身在梵天瞻之者覺神離贍部嶪嶪然觸圓青而直上野鶴經之而高翔疑掠其腹鱗鱗然壓峭碧而崛起地祇感之而下捧疑殫其力其相輪也我公誓願之日仲氏司徒自清源聞而感鑄而資雖從人力悉類神功謹按妙法蓮花品自地湧塔於佛之前其幢幡瓔珞瑪瑙車渠七盤四懸乘虛耀日乃多寶之佛發大誓願之感現也繇是以斯塔取如來之嘉號號之曰定光以其感珠之現侔於自地之湧故聯之於多寶本於孝思薦劬故冠之以報恩此其義也夫如是大雄之力出死入生至誠之神感天動地若乃沈沈夜壑浩浩世塵莫不以兹玄符承彼惠日超於三千大千之世遊乎二十八天者哉苟不之然則凡彼經文悉為之虛語耳又焉能垂信於百千年之後哉既而巍巍峩峩金輝鐵牢其東則翼以經藏焉其藏也外搆以扄八角兩層刻栴檀鏤金銅飾朱漆之炳煥仍衛華堂七間名之轉經焉致其沙門比邱比比厥迹以為拜唱趺讀叢談聚聽之湊日繫乎月月繫乎時軒軒闐闐奚景福之不幽資乎又感應天王殿一間兩厦其天王也變毗沙之身於感通之年現神質為龜城之助絛腰衣褐屣足乘雲雙吐目光兩飛霞彩乃千百億化身之一為壽山草木之應今塑於此厥感寧亡其西則翼之別殿曰塔殿其塔也我公萌誓願之先因心以制十有三層之妙形匪偉而誠有為去聲殿斯奇而塔斯處其北則報恩變相堂九間潔琉璃之地等娑婆之世七寶叢樹五色騰光明明見闍提之心一一標如來之説又僧堂五間上五間下之與茶堂五間直聯曲交冬溫夏涼又華鐘之樓迥起清音下折刀山長明燈之臺圓籠孤光杳輝漆壤其東南之一臂復建地藏殿一間兩厦功德堂五間張如別構而制匪異其殿也坐以菩薩之麗若欲飛動其堂也駢錯儀象或金範或幅繢千形百質恐悉諸天之聖侶粵間去聲焉公廳四間一厦或備旌鉞之覯止我公或四季之旦三旬之八聚僧設會拜首追祝勤勤恪恪罔所不至舉閩之高卑舉閩之少耋攀之望之無不動心涕臆君子謂豈唯冥薦於先蓋以孝教民也又庫厨五間浴室三間接之井井重以樓焉環周輻輳之行廊凡三十有三間惣費財六萬餘貫如山之疊如洞之濬巑巑隆隆叢為一宮其大也琢文石以為軒雕修虹以為梁其小也取良木於靈山篩嘉壤於飛塵雖掩映乎人間實參差乎象外其經也帙十卷於一函凡五百四十有一函惣五千四十有八卷皆極剡藤之精書工之妙金軸錦帶以為之飾天祐二年乙丑夏四月朔我公宿誠於州束烹於肆及脅降之辰大陳法會以藏平聲其經緇徒纍千士庶越萬若緇若士一而行之正身翔手右捧左授自州之戺起於我公傳至於藏觀者如堵牆佛聲入霄漢幡花照乎全郭香煙連乎半空雪頂之僧指西土之未有駘背之叟慶東閩之天降可謂之鴻因妙果者也始者我公之登壇也其一之年偃干戈興禮樂二之年陳耒耜均賦輿三之年疊貢輸祗寵澤萬乘臣其職四鄰視其睦百姓天其政故一川之鏡如靈臺之月如融融怡怡愈愈熙熙乃大讀儒釋之書研古今之理常曰文武之與釋氏蓋同波而異流若儒之五常仁義禮智信仁者含宏也比釋之慈悲為之近禮者謙讓也比釋之恭敬為之近智者通識也比釋之聖覺為之近信者直誠也比釋之正直為之近而義者殺也其為異諸武之七德至如戢兵保土安民和衆之類亦猶川陸之徂秦適洛焉然則皆謂之煩惱吾父國也子民也朝為社稷之計暮作稼穡之念若俾求智慧火乾煩惱海則非吾之所能若建金地繕金文陳法會一衆僧冀乎不可思議乃吾之所志也於是月陳三齋時或雪峰之僧圍繞千徒卧龍之僧圍繞五百以至萬錢之膳或間嘉蔬五袴之歌或參雲梵慈航駕岸法雨垂空必致菩薩化身羅漢混俗以降也時人謂靈山之會日儼矣又以府之寺至於清源或存或燼咸抽金積俸增而新之而府之開元大中神光曩塔之數與寺俱焉新於大中神光乃規舊制而精霩宏壯則邁前時開元則輔之經藏加之轉輪之盛尊大君也定光多寶報恩於劬勞故以磚磚者專也謂山度之材有蠧朽之日火化之壤無銷鑠之期其本乎土也資乎火也及投諸水火則不歸乎土不壤於水歷千秋而其質堅然乃以専至堅貞之誠寓於是則斯誠也如是得無感乎則彼珠之為符驗矣且夫珠也或頷乎龍或銜乎蛇或胎乎蚌故水懷而川媚今兹珠也不自乎龍不自乎蛇不自乎蚌匪懷水而媚川而孕厚地之二十尺豈非斯之感歟不然則始從融結而孕之也若以始從融結而孕之則厥初已兆我唐之有我公也厥初已兆我唐之有我公則我公之言烏石之有神光天王九仙代虛其作地祕其期以待我信矣塔之訖功顧小從事某有禮官甲科之忝明主研許之幸庶幾於聖人立身揚名之道命為之記用旌厥德於無窮某不敢牢讓作禮而推之言夫陶天地為後時鎖生死於無朕其道不可以真虛求聲影賾應誓願於有為現感通於至誠其道乃可以精諦至嚴敬致今我公以精諦嚴敬積功纍德以泝流于世斯塔也嶽嶽崇崇兼乎仁孝之鴻名偕天地日月江山之永遂刻于貞石焉其詞曰金聖人教德與功兮魯聖人教孝與忠兮巍巍賢傑二美鍾兮建兹寶塔惟追崇兮祝天瀝懇先延鴻兮報劬薦祉祈幽通兮仙山之秀夷且隆兮曠古為期俟仁風兮月圓珠現契遭逢兮融結之初兆英雄兮豈徒嶫嶫懿斑工兮火壤之貞積磨礱兮斧材之取厥匪同兮七層八面相玲瓏兮金鈴寶鐸交丁冬兮影落澄清馴魚龍兮頂觸圓碧分鴻濛兮繢儀範像疊其中兮齊天極地為初終兮金文貝字搆重重兮講讀千來罄西東兮靈山盛會日雍雍兮甘露法雨常蒙蘢兮鴻名冥祉偕無窮兮靈山塑北方毗沙門天王碑列藩之業有地有地之職有民有民之道興禮樂惇忠孝以行事興禮樂惇忠孝以行事然後謀謀者也築城池居其一城既築進道德以居之樹神祇以尸之為一方之巨防雖永古而無疑我相府琅琊王王公之有閩越也具列藩之業修有地之職行有民之道自乾寧四年丁巳至天祐二年壬戌凡六年禮樂興忠孝敦乃謀及城池城池及謀乃尸及神祇於是於開元寺之靈山塑北方毗沙門天王一鋪全部落已鎮于城焉大矣哉所謂闡六韜濬七德建陽功配隂隲夫毗沙門梵音唐言多聞也始自于闐剎利之英奇膺世尊帝釋之錫號居須彌山北住水晶宮殿領藥義衆為帝釋外臣以護南贍部洲其道入大乘得無生法忍住聲聞證不還果謹稽我公之築城也恢守地養民之本隆暫勞永逸之策其名舉一而生三法陽數也曰大城焉南月城焉北月城焉周圓二十六里四千八百丈基鑿於地十有五尺杵土積石而上上聲上高二十尺厚十有七尺外甃以磚凡一千五百萬片上架以屋其屋曰廊其大城之廊也一千八百有十間自廊凸而出之為敵樓樓之層者二十有三又角立之樓六其二者層復層焉皆欄干鈎聯參差煥赫而廊之若干步一鋪又各以鼓而司更焉凡三十有六謂之更鋪其四面之門八其南曰福安門福安之東曰清平門西曰清遠門其北曰安善門安善之東曰通遠門其東曰通津門通津之北曰濟川門其西曰善化門皆鐵扇銅扄開陽闔陰門之上仍揭以樓三間兩挾兩吸修廊雙面遠碧門之左右又引而出之為之亭兩間一厦又匪樓之門九曰暗門焉又水門三其二樹櫺篩波缷帆入舟鳴舷柳浦回環一郭堤諸萬户注之以堰二渡之以橋九鏡瑩虹橫交舫走蹄斯大城之制也粵南月城也東貯九仙西盛烏石之二山嘉樹蓄雲茂草藏獸城上之廊一千十有三間其中七間謂之徘徊敵樓四十有九樓之層者三其門二曰登庸門郭璞記南臺江沙合即有宰相而我公膺期今登庸門外橋名沙合橋道清門其上之樓其下之扉左右之引亭建暗門八水門二其堰一其橋五及廊之更鋪二十悉與大城類其外之東西復距而出之謂之橫城其東也城上之廊四十二間五厦其中兩間是兩面之敵樓其門一斯南月城之制也伊北月城也城上之廊六百四十二間敵樓二十有六樓之層者十其門二曰道泰門嚴勝門其上之樓其下之扉左右之引亭建暗門四水門二其橋一及廊之更鋪十有四復與南月城類又觜而出之謂之橫城城上之廊五間一厦其門一斯北月城之制也其東畫長川以為洫西連乎南句盤别浦以為溝悉通海鰌朝夕盈縮之波底澤鱗介岸泊艓艛北截越王之故山派西湖以為隍若鰲之負如甌之置軒軒然翼翼然真謂天設之府神開之地也既而我公一旦膝分席校鱗軍堵耋陳大會以落之而言曰惟閩越之為藩屏也建汀二疆束其右巖千而壑萬溟海巨流瀕其左濤雷而浪霆信乎江山奇險無以加之矧今新之以城壁城壁之以鐵石古人言得地又言守地又言堅壁豈不以得地而居守地以城城以堅壁信不疑矣然則吾之戴恩忝土勤勤懇懇不以江山奇險之為奇險不以城壁鐵石之為鐵石也修道德樹神祇以居之毗沙門之天王自天寶中使于闐者得其真還愈增宇內之敬旋大夫芮國公荆渚之塑也凡百城池莫不一之斯舊城之北往規也舊天王在子城北也斯新城之制今城也且勝莫勝於開元寺尚莫尚於寺之靈山阜寺之艮控城之乙祖僧六葉鴈其下珉石一拳星其上廬山灣落星石上有佛舍劒池徹寫飛山奔揖足以象水精而瑩宮殿掀廟貌以衛城池爰將擇工之精搜塑之妙製乎聖質俄然化出身被金甲手擎鴈塔地祗下捧天將前擁光灼灼而如將動搖神雄雄而若欲叱吒觀之者皆謂須彌拔宅於是矣于闐分身於是矣而復翼僧堂而右邃膊鐘樓而左突毳錫百萃其夏午蒲鯨六吼其宵加信為塵間之北方連營之靈域也訖命小從事某刋貞石而碑之某不敢牢讓齋戒三日抽毫而書猗歟天王因果則釋氏猛勇則兵權啓願而願從云戰而戰勝至如揮額汗以為童子却修羅之師擎手塔以貯彌陀解天鼓之赴爰皆肹蠁克致感通洎唐有土藩之黷也豆面以行疹儀金以現人嚙戈以生鼠與彼時之元應蓋大同而小異况邇則咸通季蠻之侵蜀蜀人亟祈褐衣倐以乘空目光霩以照地蛇將奔穴龜竟全城如是則護南贍部洲豈虛言哉今我公之至誠通日月宏願質鬼神以曠世之功業託無生之法力豈昔時之有是而今日之不然哉雖體蒼蒼而無言固乃昭昭而有鑒輒為之銘其詞曰受命帝釋封邑須彌金甲儼被藥義雄隨越七金山突修羅師入大乘妙與聲聞差于闐分身皇唐衛國若加善禱咸蒙聖力雁塞煙塵龜城戈戟邊騎猶東蠻車未北現以真儀忘乎悖德懿彼閩越大哉侯王仗鉞務本築城為防石取他山壤塹聯岡疊百厥雉纍千乎廊却鐵之觸疲羽之祥奔馬轡並馳車軌方巢鳳於樓蟄龍於隍如嶽斯立如翼斯張不有依憑曷旌扃鐍台略俄啓神驅遽設鐵鬚卓堅漆曈曝昳捧足神俯持劒將列月殿巍峩靈山嶻㠔法逮無生權唯有兵昔之若是今肯忘情閩山永高閩江永清厥宜識之盤石斯城丈六金身碑釋氏之稱釋迦牟尼佛千百億化身而古今之世以諸佛菩薩其或鑄成塑成刻成其或壁繪幅繪乎像不可勝紀况多應現感通之自其非之乎我公粵天祐三年丙寅秋七月乙丑鑄金銅像一句丈有六尺之高後二十有三日丁亥繼之鑄菩薩二句丈有三尺高銅為內肌金為外膚取法西天鑄成東越巍巍落落毫光法相初我公登壇之三年己未秋一夕雨歇天清風微月明瑤兔無煙銅龍有聲俄夢天之西際霩以照物綵雲罅裂大佛中座嶽嶽以覯止熙熙而啓言曰斷豫一臂衛之一方既覺而思現乎形昭像也斷一臂誓誠也衛一方保衆也始嘉其異姑默其事後創其意乃命自賓席之逮將校將校之逮步乘步乘之逮衆庶其有植信根之深者映惠燭之明者許一以金投吾俸中將櫝于肆俟以銅易而後鳩工鴻爐卜境擇日鑄斯佛於九仙山定光多寶塔之右古仙徐登上升之地其日圓空鏡然江山四爽橐籥之上上聲騰為煙雲盤旋氤氲五色成文又有羣鳥或若鴻鵠或如鶯鵲交翔而間鳴自寅而及午斯佛也一瀉而成翼日我公禮閲之乃與夢中一類其形儀長短大小無少差其一臂工以之別鑄而會其像大工慮其不就計以一臂別鑄而會之乃暗符夢中我公神之而露其夢於是迎入府之別亭磨瑩雕飾克盡其妙朝夕瞻拜時不之怠冬十有二月丙申會僧千千以幡以幢以鐘以磬引歸於開元寺壽山之塔院獨殿以居之翼二菩薩於左右三十二相足八十種好具螺纍纍以成髻珠隱隱以炫額檀信及門而膝地童耋遍城而掌膠夫如是豈非千百億化身之一乎不然者焉得入乎夢而如乎神成乎形而如乎夢夢不之告工以之缺者哉其應現感通復為之殊矣大矣哉且先天地生之謂道後天地設之謂象道者也以無為為志之者授心印於虛空象者也以有為為志之者疊慧力於報應論者惑句以之為風馬曾不謂象猶道之轂也無象道不行矣始者摩騰竺法蘭二梵僧不愼其像東其道且西耳惜乎不與三皇五帝同世而出設與三皇五帝同世而出必能從容朴素遲回仁義詐偽未之亟蠧也奈何天將後之豈徒然哉豈不以仁義之生也曰堯與舜仁義之亡也曰癸與受至於列國之際強秦之立癸受之悖亹亹其躅天謂仲尼之祖述堯舜憲章文武終不能獨制之故東釋迦牟尼於中土大陳出生入死之理天堂地法之事以警戒之雖人世之風波萬態逆翻而幽府之鐵縲一無苟免上智聞之若鏡之磨中智聞之若泉之澄下智聞之若火之燒謂之為有則河沙芥子之説虛誕難測謂之為無則應現感通之事尋常立驗故能銷嗜欲更禍福一貴賤則為禆教化之一源湛然不動感而遂通者也而以金厥地蓮厥宮張法橋以度人無刑網以束俗世之敬之可也怠之可也黷之可也繇是有委之國君委之大臣之旨既而委之則人非常人道非常道我公曠代之生也有神僧識仗鉞之雄也應江沙期合仙人讖築城之盛也契菩薩説初丙午嵗我公至清源未仕時有僧號涅槃於衆中駭而指之曰金輪王之弟三子降人間幸勉之專生殺柄又閩之侯未嘗至宰輔晉時郭璞記曰南臺江沙合即有宰輔相我公之登台席也江沙契焉又梁時王霸怡山上升山在府城之西五里光啓丁未嵗衢之爛柯山道士徐景立因於其仙壇東北隅取土掘得瓷瓶七口各可容一升水其中悉有炭上總蓋一青􅝩刻文字云樹枯不用伐壇壞不須結未滿一千嵗自有系孫列後來是三皇潮水蕩禍殃巖逢一乍間未免有銷亡子孫依吾道代代封閩疆其壇東南有皀策樹古云真君於此樹上上升其後枯矣至咸通庚寅嵗復榮茂也又媯山僧號大安頃坐西禪者乾符中曰府城之到九仙三橋其中乃菩薩行化今之新城及焉夫神通為佛魂交曰夢神非夢而罕通夢非神而不感我公之慶鍾也其如是矣其明年正月十有八日乙未設二十萬人齋號無遮以落之是日也綵雲纈天甘露粒松香花之氣撲地經梵之聲入空座客有右省常侍隴西李公洵翰林承旨制誥兵部侍郎昌黎韓公偓中書舍人琅琊王公滌右補闕博陵崔徵君道融大司農琅琊王公標吏部郎中譙國夏侯公淑司勳員外郎王公拯刑部員外郎𢎞農楊公承休𢎞文館直學士𢎞農楊公贊圖𢎞文館直學士琅琊王公倜集賢殿校理吳郡歸公傅懿皆以文學之奧比偃商侍從之聲齊褒向甲乙升第巖廊韞望東浮荆襄南逰吳楚謂安莫安於閩越誠莫誠於我公依劉表起襄漢其地也交轍及館值斯佛之成斯會之設俱得放心猿於菩提樹上歇意馬於清涼山中我公乃顧幕下者滔俾刻貞石以碑之某以甲科忝第盛府蒙招刋勒之職不敢牢讓謹推於厥旨經云作佛像之功德斗量海以有盡塵碎劫以無窮至若青黛之畫辟支一金之補毗婆戲為之而以草木思見之而刻栴檀其猶蛻現其生羽金其報而况今乃儼至誠從靈感銅乎萬萬金乎千千虔鼓鑄於神仙之山卜貞吉於火土之數其積功纍德豈可以邊以涯而言之哉或曰梁武帝之隆釋氏今古靡倫奚報應之昧乎對曰梁武帝隆釋氏之教不隆釋氏之旨所以然也夫帝王之道理世也釋氏之教化人也理世之與化人蓋殊路而同歸彼宵旰於萬有故一夫不獲若已隕諸隍中此濟度於觸類故欲凡一有情悉皆成佛梁武帝則不然以民之財之力剎將三百祈功覬德則歸諸已啼億兆而不乳削頂頷以言覺所以私所以然也今我公為邦則忠孝於君親自興兵之來天下以三司之泉皆名直進獨我公以俸錢為直進三司之運悉如舊焉闕庭大稱其美牧人則父母於生民造塔四其一曰壽山以昭皇帝辛酉歲西巡發誓願以祝熊羆乞車駕之復宮闕其二曰報恩多寶定光追薦於先世其三其四大中神光為軍旅也為人民也繕經五藏其二進於上其三附於壽山定光大王意同乎塔月三其齋或千僧或千佛疏乎誠首則君親次則軍旅人民而已後焉况斯佛已之而不已與賔席將校步乘衆庶共成之故其地出明珠海出珊瑚幾於蓮花妙品之繁車渠瑪瑙幡幢瓔珞周乎多寶之湧也開元定塔基掘地丈有五尺之深得寶珠坐以金錢又於海中得珊瑚樹凡二百餘株矣夫其玄貺之如彼靈感之若此則斷一臂衛一方斯昭昭矣豈與彼而論哉某是輒奮筆而無愧為其詞曰託入佳夢鑄成鴻爐毫光法相銅肌金膚恍惚現形昭彰合符不有為也其如是乎唐一其宇越百其區伊閩之設於地之殊西城甌仭東塹鰲隅匪德莫處惟仁靡逾懿其橐籥飛作醍醐焦山草木不得不蘇苦海波瀾不得不枯仙花罔謝慧日寧徂永兹一方盤石其都莆山靈巖寺碑銘釋波東流湧為花宮花宮之構咸宅靈秀靈秀之啓其或神授則知融結之始已有待於金聖人也粵靈巖寺乃莆山之靈秀焉神授焉懿夫嶽立大山堆下數峰面乙臂坤石嵌松瘦昔梁陳間邑儒滎陽鄭生家之生嚴乎一堂架以詩書既而秋一夕風月清朗俄有神人鶴髮麻衣丈餘其狀見於堂曰誠易兹為佛宇善莫之大生拜而諾瞬而失旋以堂居僧像佛獻其居為金仙院即陳永定二年庚申也鶴髮麻衣西天之謂故號金仙山水推其奇鶴髮增其異緇錫日萃院落日峻隋開皇九年升為寺焉左漱寒泉右擁疊巘危樓豁壺公之翠上方視鰌海之波唐景雲二年辛亥寺僧志彥入內背文講四分律睿宗嘉之錫號聰明彥因獲言所居寺之自復有僧無際持妙法蓮華經感石上湧白泉僧歿而泉變清焉遂膺敕額為靈巖寺太和二年殿中彭城劉公軻幕提泉印聆寺之勝不缷而宿候吏不蔬而午掬泉而漱隨手以涸其石今坎於上方之上其僧復有玄悟玄凖慧全省文靈敞無了悉間生祗園堅持密行或臨壇表德或降虎示真厥衆如雲厥施若市洎武宗皇帝乙丑之否邑之東有敬善寺民井而居之乾有玉澗寺民畝而田之獨兹之奇豪人互以金輸為幽宅之卜若有之衛竟不克遂敞公了公乃除帽首絛腰沈蹤處晦逮宣宗皇帝之復索之於石罅雲根歸之於蕪基燒址山靈之感行羶之慕投金執斫匪招匪勸不越閏而其宇鱗鱗其徒翼翼敞公咸通六年秋八月云滅靡風而大樹折庭靡觸而大殿傾瓦了公八年冬十月坐亡色身不壞今龜陽之號真身大師者也則知僧以行而神其亦地以靈而感若乃軒軒月殿藹藹松門醍醐雨天琉璃鏡地慧燭九枝而吐焰慈雲五色以垂隂推於甌越居之甲乙今僕射琅琊王公牧民之外雅隆淨土論及靈勝以為東山神泉之比神泉寺在府城之東山其泉亦自僧感而湧也繕經五千卷於兹華創藏而藏平聲焉即天祐二年春二月也初侍御史濟南林公藻與其季水部員外郎藴貞元中居兹而業文歐陽四門捨泉山而詣焉四門家晉江泉山在郡城之北其集有與王式書云莆陽讀書即兹寺也其後皆中殊科御史省試珠還合浦賦有神授之名水部應賢良方正科擅比干之譽䇿云臣遠祖比干因諫而死天不厭直更生微臣也歐陽垂四門之號與韓文公齊名得非山水之靈秀乎元和才子章孝標邵楚萇朱可名寄詩以題大中中宣宗元年丁卯號大中凡十三年潁川陳蔚江夏黃楷長沙歐陽碣兼愚慕三賢之懿躅葺齋於東峰十年咸通乾符之際懿宗元年庚辰改咸通凡十四年僖宗元年甲午改乾符豪貴塞龍門之路平人藝士十攻九敗故穎川之以家寃也與二三子率不西邁而愚奮然凡二十四年於舉場幸忝甲第東歸之尋舊址蒼苔四疊嘉樹雙亞今東峰雙龍眼樹即往嵗書齋之庭隂也訪舊僧雲扃十扣雪頂一存於是謹祝金儀益誓丘禱以謝兹山之靈秀刻銘貞石兼補前賢之未述其詞曰山奇孕神地勝惟靈螢窗既夜鶴髮斯形一畝請宮雙蓮建扃洞深夏寒林茂冬青松竹鏗樂峰巒豁屏皛迷蟾窟茫眺鰌溟持經僧志湧石泉泠四分律講萬乘君聽敕飛額降寺以靈名不有地祥焉動天庭大士鴻生珠明桂馨良牧聳聞華構藏經浩劫不泯匪兹曷丁敬祝巉巖勒石以銘龜洋靈感禪院東塔和尚碑三教之垂萬古也咸以師弟子授獨釋氏之師弟子削姓以名別為父子之流葉東塔和尚葉真身大師其道偕極不可思議以父子言克盡弓裘之善和尚法號志忠俗姓陳世居仙遊祖諱璠父諱笻繼以好尚山水崇佛友僧生和尚自於乳抱鼻逆羶辛九歲詣真身大師為童子一見之兩如宿契年十五落髮初大師之卜龜洋也雲木之深藤蘿如織狼虎有穴樵採無徑俄值六眸之巨龜足躡四龜俯仰其首如作禮者三逡巡而失遂駐錫卓庵名其地曰龜洋焉龜洋之泊也盂不及村畬不及災山産菜號苦蓋以之充卯而齋惟大師與和尚俱歲移月更名馳迹漏檀信尋而施漁獵投而事時謂之二菩薩僧其地或來人之稍乖嚴潔則立有蛇虎驚吼之怪及武宗皇帝乙丑之否棄之而絛帽潛匿大師允檀信之迎隱於數家和尚棲於巖穴之內不離兹山相伍者麋鹿馴伏者虎狼既而靡耕災杜施丐還取苦蓋之卯至今兹院之逢歉歲一卯之風不泯宣宗皇帝復寺之始議者以靈巖之奇勝非我菩薩僧不可以宏就由是都人環乞大師以居故和尚獨荐龜洋之址焉松堂揭而覺路喧天金磬敲而道花滿地誠以上升道士不受籙成佛沙彌不具戒和尚且不之然旋將西遊受具足戒於襄州龍興寺大中十二年東還由廬陵與草庵和尚值草庵曰來自何山曰六眸山曰六通乎曰慧非重瞳和尚蓋行高而言寡是日對答如流既及本山人地愈盛院落則不營而峻供捨則不化而來咸通三年靈巖力圓乃迎大師返於兹八年大師坐亡法身不壞南北歸敬闐然無時和尚以之煩十三年遂南五步里之山得峰之秀室而禪焉即今南畬也廣明元年弟子智朗惠朗玄鑒藏輝景間𢎞幹鴻超悉以植性祗園分光慧炬以謂我大師承法馬祖親得心印則和尚焉今以宿曉而晦辭煩即靜不可使六眸靈感之地留形示滅之異葉其葉而不之大乎於是迓乞歸於院將以𢎞張法輪式救迷津其如感通雖然現沒有數中和二年是時公尚未登甲科龍集壬寅三月十日示滅壽年六十有六僧夏二十有五後二旬之一日建窣堵波於東岡焉嗚呼和尚之道不粒而午不宇而禪與虎狼雜居所謂菩薩僧信矣其三月之朔語其衆曰至道之有顯晦師弟子不欲雙立昔大師之去也留形為之顯今吾之行矣速藏為之晦故將儀貌若生而蓋棺晦朔不逾而啓土從付囑也其上足景間𢎞幹以凡紀道名須資詞筆懇賫行實扣愚求文某早訪蓮扃今悲松塔敢辭抽思用刻貞銘為之銘曰六眸獻山二葉開蓮號及菩薩正真自然雲林匿迹狼虎參禪仙花撲地智月懸天示滅之滅顯晦岐焉布金左岡建塔開阡實歸上界寧曰下泉松風柏雨空悲歲年華巖寺開山始祖碑銘師法號行標俗姓方祖榮父安莆之盛族師生於建中二年辛酉齠齓即穎悟異於諸童九嵗投玉澗寺監寺神皎出家將二年皎嘉其拔萃命之落髮師以梵行未至不敢預大僧數至貞元十七年時師年二十一方剃鬢髭翼日遽講所習涅槃經一寺歎服既而辭其師北遊抵京薦福寺受戒品詣章教大師法會章教奇之令首其衆凡十年士君子之造者無不聳慕尋為功德使推入道場憲宗善之元和十一年丙申師年三十六東歸復于玉澗焉法雨隨車慈雲被物洎武皇帝會昌元年辛酉除佛舍籍釋子於戶部師則巾華陽衣縫掖晦迹樵客廬于西巖石室律身守道如居千衆及宣皇帝復寺大中元年丁卯師年六十七刺史琅琊王公迎以幡花舍於郡開元寺俾為監領大中六年師年七十二師以環足之煩擁旅之數乞歸故山先時玉澗之北巖泉石之奇也卜而居之縣令中山甄宿與莆之士庶爭沐醍醐共隆蘭若煙巒蔽虧朱碧掩映前俯平川後峙奔嶠地自人勝名由道高刺史河東薛公仰其孤風復馳開元之僧衛以入郡日扣華嚴大義幾忘食寢洎解印與之偕至北巖題之為華嚴院以徹祠部焉師咸通六年七月五日示滅壽八十有五僧夏六十有四後四十有五日建窣堵波于西岡十一年其徒從紹疏師行實于闕升其院為華嚴寺有徒三十人皆肅肅可觀不忝師門於戲師儀梵骯髒言詞雅直沖默而明敏慈恕而剛毅儒書皆通三皇五帝之道言未嘗及而人知其博古也經論綜貫天堂地法之説舌未嘗舉而人皆務崇善也所至清風凛凛政所謂釋子之高傑者也弟子道光道圓令詢悉器傳師道愚冠扣師關壯以隨計乾寧二年忝登甲科東還薦造金地歲周三紀膠掌而拜影堂腹藁而銘遺美不可使桑門大士泯而無述焉故銘曰智月不缺乘虛照物道花不衰吐艷無時洞徹照灼傑然吾師稟薦福戒分章教枝厥宗得雋內庭擢之銜香徹印雲間資期數有汙隆道無磷緇德風徒襲法舸寧維山幽迹高身沒名垂松塔雖故竹毫可追稽首影堂敬刻斯碑福州雪峰山故真覺大師碑銘大師法號義存長慶二年壬寅生於泉州南安縣曾氏自王父而下皆友僧親佛清淨謹志大師生而鼻逆薰血乳抱中或聞鐘磬或見僧佛其容必動以是別鍾愛於膝下九歲請出家叶而未即十二從家君遊莆田玉澗寺寺有律僧慶元持行高潔遽拜之曰我師也遂留為童子焉十七落髮淳朴貞古了與流輩異暨武宗皇帝乙丑之否乃束髮於儒冠菜中而蓬迹來府之芙蓉山𢎞照大師見奇之故止其所至宣宗皇帝之復其道也涅而不緇其身也褒然而出北遊吳楚梁宋燕秦受具足戒於幽州寶剎寺訖巡名山扣諸禪宗突兀飄颻雲翔鳥逝爰及武陵一面德山止於珍重而出其徒數百咸莫之測德山曰斯無偕也吾得之矣咸通六年師歸於芙蓉之故山其年圓寂大師亦自溈山擁徒至坐于怡山王真君上升之地其徒熟熟師已嗣德山纍纍而欵關師拒而久之則有行實者始以師同而議曰師之道巍巍乎法門圍繞之所不可造次其地宜若鷲嶺猴江之為卜府之西二百里有山焉環控四邑峭拔萬仭崷崒以支圓碧培塿以瓜見羣青怪石古松棲蟄龜鶴靈湫邃壑隱見龍雷山之半頂之上則先冬而雪盛夏而寒其樹皆別垂藤蘿䒠茸而以為之衣交錯而不呈其形奇姿異景不可殫狀雖霍童武夷無以加之實閩越之神秀而古仙之未攸居誠有待於我師也祈以偕行去聲秋七月穿雲躡蘚陟險升幽將及之師曰真吾居也其夕山之神果效靈翼日巖谷爽朗煙霞飛動雲庵既立月構旋隆繇是柅法輪於無為樹空門於有地行實乃請名其山曰雪峰以其冬雪夏寒取鷲嶺猴江之義始則庚寅逮於乙未師以山而道侔山以師而名出天下之釋子不計華夏趨之如赴召乾符中觀察使京兆韋公中和中司空潁川陳公每渴醍醐而不克就飲交使馳懇師為之入府從人願也其時內官有復命于京語其道其儕之拔俗悟空者請蛻浮華而來剃僖宗皇帝聞之翰林學士訪於閩人陳延郊得其實奏於是聖錫真覺大師之號仍以紫袈裟俾延郊授焉大師授之如不授衣之如不衣居纍夏辛亥歲朔遽然杖屨其徒啓而不答雲以隨之東浮于丹丘四明明年故府侍中之有無諸句尅句洗兵於法雨致敬於禪林馥師之道常東望頂手後二年自吳還閩大加禮異今閩王誓衆養民之外雅隆其道凡齋僧構剎以之龜焉為之增宇設像鑄鐘以嚴其山優施以充其衆時則迎而館之于府之東西甲第每將儼油幢聆法輪未嘗不移時餘乎一紀勤勤懇懇熊羆之士因之投迹檀那漁獵之逸其或弭心鱗羽戊辰年春三月示疾吾王走醫醫至粒藥以授師曰吾非疾也不可罔子之工卒不之餌其後札偈以遺法子函翰以別王庭夏五月二日鳥獸悲鳴雲木慘悴其夜十有八刻時滅度俗壽八十有七僧臘五十有九以其月十五日塔其藏焉其塔也其徒僉云以山之奇堂之峻法堂也大師之生也王去聲是其歿也不宜捨諸故坎其中焉若干尺之高若干尺之周皆雕珉石錯火壤磷磷然嶪嶪然四隅則環宇以庥玲瓏􅌄窱雲霞時入風雨罔侵其日奔閩之僧尼士庶僅五千人閩王娣之子降左金吾衛將軍檢校刑部尚書延稟始陳祭是設齋焉大矣哉大師之見世于是罔量其僧邪自始及兹凡四十年東西南北之夏往秋適者不可勝紀而常不減一千五百徒之環足其趨也馳而愈離辨而愈惑常曰三世諸佛十二分教到此乃徒勞耳其庶幾者若干人其一號師備擁徒于元沙今安國也其二號可休擁徒于越州洞巖其三號智孚擁徒于信州鵝湖其四號慧稜擁徒于泉州招慶其五號神晏今府之鼓山也分燈之道皆膺聖奬錫紫袈裟而玄沙級宗一大師招慶玄晤大師鼓山定慧大師之命焉其曹早曰法雖無説名以文垂自少林之逮曹溪無不刻碑而紀頌我師其默乎一旦惣其曹句首曰從智如堵而扣愚求文某老且病刋勒之加多已辭避欽師之道不覺聳然偉夫恭聞釋波之東注也流其象則不流其旨流其旨則不象其形厥初大迦葉之垂二十八葉至于達磨達磨六葉止于曹溪分宗南北德山則南宗五葉大師嗣句其今六葉焉雪峰之分玄沙洞巖鵝湖招慶鼓山其道皆離貝葉以祗其七非某之能言也但美數公葳蕤其葉衆多殷勤之請遂為之銘而應其求其詞曰曹溪分派誰繼南宗一言冠絶六葉推雄無物之物非空之空不瑩而明不增而隆縮靡秋毫舒靡鴻濛不有靈鏡曷揚真風懿彼閩越巍乎一峰洞壑斯異雪霜罕同天之有待師也云鍾名將道協迹與仙崇奔走厥徒百千其叢庶幾幾人莫不玄通分燈照耀樹本玲瓏聖君寵疊賢王敬重不生不滅曷始曷終刻貞石於斯文旌厥德於梵宮黃御史集卷五
